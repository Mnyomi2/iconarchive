name: Auto Download Icons

on:
  workflow_dispatch: # 1. Allows you to run it manually from the "Actions" tab!
  push:
    paths:
      - 'Designer.txt' # 2. Auto-runs if you add a new artist to Designer.txt

permissions:
  contents: write # Crucial: Allows the bot to upload files back to the repo

jobs:
  download-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml tqdm

      - name: 🚀 Run Scraper (Vector + Update)
        run: |
          # We use "update vector" so it checks existing folders for newly released icons
          python3 iconarchive_perfect_selective.py vector

      - name: 📤 Auto Commit and Push back to GitHub
        run: |
          # Set up the GitHub Actions Bot identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the newly downloaded files and the updated master_index.json
          git add iconarchive/ master_index.json Designer.txt
          
          # Check if there are actually any new files downloaded
          if git diff --staged --quiet; then
            echo "✅ No new icons were downloaded. Everything is up to date."
          else
            echo "🚀 New icons found! Committing to the repository..."
            git commit -m "🤖 Auto-downloaded missing vector icons & updated index"
            git push origin HEAD:${GITHUB_REF}
          fi

jobs:
  name: Download Vector Icons

on:
  workflow_dispatch:

  # Runs every Sunday at 00:00 UTC
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write

concurrency:
  group: vector-icons-download
  cancel-in-progress: false

jobs:
  update-icons:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 📦 Install requirements
        shell: bash
        run: |
          set -euxo pipefail

          python -m pip install --upgrade pip

          pip install \
            requests \
            beautifulsoup4 \
            lxml \
            tqdm

      - name: 🚀 Run vector icon scraper
        shell: bash
        run: |
          set -euxo pipefail

          python3 iconarchive_perfect_selective.py vector

          echo "📂 Generated files:"
          ls -lah

      - name: 📤 Commit and push changes
        shell: bash
        run: |
          set -euxo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add files if they exist
          git add -A

          # Check for changes
          if git diff --cached --quiet; then
            echo "✅ No new changes to commit."
            exit 0
          fi

          git commit -m "🚀 Auto-update vector icons"

          git push
          
          echo "✅ Successfully pushed updates!"

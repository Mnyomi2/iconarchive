<!DOCTYPE html>
<html lang="en"> <!-- Light mode default -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Icon Gallery</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#121212', 800: '#1e1e1e', 700: '#2d2d2d', 600: '#3f3f3f' }
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Transparent Checkerboard Pattern (Like Photoshop) */
        .bg-checker {
            background-color: #ffffff;
            background-image: 
                linear-gradient(45deg, #f3f4f6 25%, transparent 25%, transparent 75%, #f3f4f6 75%, #f3f4f6),
                linear-gradient(45deg, #f3f4f6 25%, transparent 25%, transparent 75%, #f3f4f6 75%, #f3f4f6);
            background-size: 16px 16px;
            background-position: 0 0, 8px 8px;
        }
        .dark .bg-checker {
            background-color: #1e1e1e;
            background-image: 
                linear-gradient(45deg, #2d2d2d 25%, transparent 25%, transparent 75%, #2d2d2d 75%, #2d2d2d),
                linear-gradient(45deg, #2d2d2d 25%, transparent 25%, transparent 75%, #2d2d2d 75%, #2d2d2d);
        }

        /* Hover animations */
        .icon-card .overlay { opacity: 0; transition: opacity 0.2s ease-out; }
        .icon-card:hover .overlay { opacity: 1; }
        
        /* Hide Details Transition */
        .details-text { transition: all 0.2s; }
        
        /* Checkbox Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2563eb; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark-900 text-gray-900 dark:text-gray-100 h-screen flex overflow-hidden font-sans transition-colors duration-300">

    <!-- SIDEBAR (Collapsed by default) -->
    <aside id="sidebar" class="w-72 bg-white dark:bg-dark-800 border-r border-gray-200 dark:border-dark-700 flex flex-col transition-transform duration-300 absolute md:relative z-40 h-full -translate-x-full shadow-2xl md:shadow-none flex-shrink-0">
        <div class="h-16 flex items-center justify-between px-6 border-b border-gray-200 dark:border-dark-700">
            <h2 class="font-bold text-lg"><i class="fa-solid fa-sliders text-blue-500 mr-2"></i> Filters</h2>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-500 hover:text-gray-900 dark:hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-8">
            <!-- View Settings -->
            <div>
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">View Settings</h3>
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium">Show Icon Names</span>
                    <label class="switch">
                        <input type="checkbox" id="toggleDetails" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- Formats -->
            <div>
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Formats</h3>
                <div class="flex flex-wrap gap-2" id="formatFilters">
                    <button class="filter-btn active px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-600 text-white shadow" data-filter="all">All</button>
                    <button class="filter-btn px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 dark:bg-dark-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-dark-600 border border-gray-200 dark:border-dark-600" data-filter="Vector">SVG</button>
                    <button class="filter-btn px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 dark:bg-dark-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-dark-600 border border-gray-200 dark:border-dark-600" data-filter="PNG">PNG</button>
                    <button class="filter-btn px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 dark:bg-dark-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-dark-600 border border-gray-200 dark:border-dark-600" data-filter="Favicon">Favicon</button>
                </div>
            </div>

            <!-- Sizes (Dynamically Populated based on PNG/ICO) -->
            <div id="sizeFilterContainer" class="hidden">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Size (px)</h3>
                <div class="flex flex-wrap gap-2" id="sizeFilters">
                    <!-- Pills injected via JS -->
                </div>
            </div>
        </div>
    </aside>

    <!-- Overlay for Mobile Sidebar -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-30 hidden" onclick="toggleSidebar()"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0 relative h-full">
        
        <!-- Top Navbar -->
        <header class="h-16 px-4 sm:px-6 flex items-center justify-between border-b border-gray-200 dark:border-dark-700 bg-white dark:bg-dark-800 z-20">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 transition w-8 h-8 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-700 flex items-center justify-center">
                    <i class="fa-solid fa-bars text-lg"></i>
                </button>
                <div class="font-bold text-xl tracking-tight hidden sm:block">Icon<span class="text-blue-600">Gallery</span></div>
            </div>

            <!-- Global Search -->
            <div class="relative w-full max-w-md mx-4">
                <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Search icons..." 
                    class="w-full bg-gray-100 dark:bg-dark-700 border-transparent text-sm rounded-full pl-9 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <button id="themeToggle" class="text-gray-500 w-8 h-8 rounded-full hover:bg-gray-100 dark:hover:bg-dark-700 flex items-center justify-center transition">
                <i class="fa-solid fa-moon block dark:hidden"></i>
                <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
            </button>
        </header>

        <!-- Breadcrumbs Navigation -->
        <div class="bg-gray-50 dark:bg-dark-900 border-b border-gray-200 dark:border-dark-700 px-6 py-3 flex items-center gap-2 text-sm font-medium overflow-x-auto no-scrollbar" id="breadcrumbs">
            <button onclick="goHome()" class="text-blue-600 hover:underline flex items-center gap-1"><i class="fa-solid fa-house"></i> Home</button>
        </div>

        <!-- Scrollable Content Area -->
        <div id="scrollContainer" class="flex-1 overflow-y-auto p-6 relative">
            
            <div id="loading" class="flex flex-col items-center justify-center h-full">
                <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
                <p class="text-gray-500">Processing repository...</p>
            </div>

            <!-- Dynamic Views -->
            <div id="viewContainer" class="hidden">
                <!-- Artists Grid -->
                <div id="artistsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 hidden"></div>
                
                <!-- Packs Grid -->
                <div id="packsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6 hidden"></div>
                
                <!-- Icons Grid -->
                <div id="iconsGrid" class="grid gap-4 hidden" style="grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));"></div>
            </div>
            
            <div id="noResults" class="hidden flex flex-col items-center justify-center py-20">
                <i class="fa-regular fa-folder-open text-5xl text-gray-300 mb-4"></i>
                <p class="text-gray-500 text-lg">No assets found.</p>
            </div>
            
            <div id="scrollLoading" class="hidden text-center py-6">
                <i class="fa-solid fa-ellipsis fa-bounce text-2xl text-gray-400"></i>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-5 py-3 rounded-xl shadow-2xl opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-3 transition-all">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toastMsg" class="font-medium text-sm">Action successful!</span>
    </div>

    <script>
        // --- CONFIGURATION ---
        const GITHUB_USERNAME = "Mnyomi2";
        const REPO_NAME = "iconarchive";
        const BRANCH = "main";
        const CDN_BASE = `https://cdn.jsdelivr.net/gh/${GITHUB_USERNAME}/${REPO_NAME}@${BRANCH}/`;
        const JSON_URL = CDN_BASE + "master_index.json";

        // Global State & Data Structure
        let allIcons = [];
        let groupedData = {}; // { ArtistName: { PackName: [icon1, icon2...] } }
        let availableSizes = new Set();
        
        let currentState = {
            view: 'artists', // 'artists', 'packs', 'icons', 'search'
            artist: null,
            pack: null,
            format: 'all',
            size: 'all',
            showDetails: true
        };

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const viewContainer = document.getElementById('viewContainer');
        const artistsGrid = document.getElementById('artistsGrid');
        const packsGrid = document.getElementById('packsGrid');
        const iconsGrid = document.getElementById('iconsGrid');
        const breadcrumbs = document.getElementById('breadcrumbs');
        const toggleDetails = document.getElementById('toggleDetails');
        const sizeFilterContainer = document.getElementById('sizeFilterContainer');
        const sizeFilters = document.getElementById('sizeFilters');

        // Render limits for Infinite Scroll
        let currentRenderLimit = 100;
        let activeIconList = []; // The list currently being rendered

        // 1. Theme Initialization
        const htmlElement = document.documentElement;
        if (localStorage.getItem('theme') === 'dark') { htmlElement.classList.add('dark'); }
        document.getElementById('themeToggle').addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            localStorage.setItem('theme', htmlElement.classList.contains('dark') ? 'dark' : 'light');
        });

        // 2. Fetch & Process Data
        async function init() {
            try {
                const res = await fetch(JSON_URL + "?t=" + Date.now());
                if (!res.ok) throw new Error("JSON Fetch Failed");
                const rawData = await res.json();
                
                // Process and Group Data
                rawData.forEach(icon => {
                    // Extract size from filename (e.g., .48.png, -64px.ico, 128x128.png)
                    const sizeMatch = icon.name.match(/[\.-]((\d+x\d+)|\d+)(px)?\.(png|ico|icns)$/i);
                    icon.size = sizeMatch ? sizeMatch[1] : 'Vector';
                    icon.fullUrl = CDN_BASE + icon.path;

                    if (!groupedData[icon.artist]) groupedData[icon.artist] = {};
                    if (!groupedData[icon.artist][icon.set]) groupedData[icon.artist][icon.set] = [];
                    
                    groupedData[icon.artist][icon.set].push(icon);
                    allIcons.push(icon);
                });

                document.getElementById('loading').classList.add('hidden');
                viewContainer.classList.remove('hidden');
                renderArtists();
            } catch (err) {
                document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">Error loading index. Please ensure master_index.json exists.</p>`;
            }
        }

        // --- NAVIGATION & RENDERING ---

        function updateBreadcrumbs() {
            let html = `<button onclick="goHome()" class="text-gray-500 hover:text-blue-600 transition flex items-center gap-1"><i class="fa-solid fa-house"></i> Home</button>`;
            
            if (currentState.view === 'search') {
                html += `<span class="text-gray-400 mx-2">/</span><span class="text-gray-900 dark:text-white font-bold">Search Results</span>`;
            } else {
                if (currentState.artist) {
                    html += `<span class="text-gray-400 mx-2">/</span><button onclick="openArtist('${currentState.artist}')" class="text-gray-500 hover:text-blue-600 transition truncate max-w-[150px]"><i class="fa-solid fa-user-pen mr-1"></i>${currentState.artist}</button>`;
                }
                if (currentState.pack) {
                    html += `<span class="text-gray-400 mx-2">/</span><span class="text-gray-900 dark:text-white font-bold truncate max-w-[200px]"><i class="fa-solid fa-folder mr-1"></i>${currentState.pack}</span>`;
                }
            }
            breadcrumbs.innerHTML = html;
        }

        function goHome() {
            currentState.view = 'artists';
            currentState.artist = null;
            currentState.pack = null;
            document.getElementById('searchInput').value = '';
            sizeFilterContainer.classList.add('hidden');
            renderArtists();
        }

        function openArtist(artistName) {
            currentState.view = 'packs';
            currentState.artist = artistName;
            currentState.pack = null;
            sizeFilterContainer.classList.add('hidden');
            renderPacks();
        }

        function openPack(packName) {
            currentState.view = 'icons';
            currentState.pack = packName;
            
            // Generate Size Filters for this pack
            availableSizes.clear();
            groupedData[currentState.artist][packName].forEach(icon => {
                if (icon.size !== 'Vector') availableSizes.add(icon.size);
            });
            
            renderSizeFilters();
            renderIconsList(groupedData[currentState.artist][packName]);
        }

        // --- RENDERERS ---

        function renderArtists() {
            updateBreadcrumbs();
            hideAllViews();
            artistsGrid.classList.remove('hidden');
            artistsGrid.innerHTML = '';

            Object.keys(groupedData).sort().forEach(artist => {
                const count = Object.values(groupedData[artist]).flat().length;
                const packCount = Object.keys(groupedData[artist]).length;
                
                const card = document.createElement('div');
                card.className = "bg-white dark:bg-dark-800 border border-gray-200 dark:border-dark-700 p-6 rounded-2xl text-center cursor-pointer hover:shadow-lg hover:border-blue-500 transition group flex flex-col items-center justify-center";
                card.onclick = () => openArtist(artist);
                
                // Create a colored avatar based on first letter
                const colors = ['bg-blue-500', 'bg-purple-500', 'bg-green-500', 'bg-orange-500', 'bg-pink-500'];
                const color = colors[artist.charCodeAt(0) % colors.length];

                card.innerHTML = `
                    <div class="w-16 h-16 rounded-full ${color} text-white flex items-center justify-center text-2xl font-bold shadow-inner mb-4 group-hover:scale-110 transition-transform">
                        ${artist.charAt(0).toUpperCase()}
                    </div>
                    <h3 class="font-bold text-gray-900 dark:text-white truncate w-full" title="${artist}">${artist}</h3>
                    <p class="text-xs text-gray-500 mt-1">${packCount} Packs • ${count} Icons</p>
                `;
                artistsGrid.appendChild(card);
            });
        }

        function renderPacks() {
            updateBreadcrumbs();
            hideAllViews();
            packsGrid.classList.remove('hidden');
            packsGrid.innerHTML = '';

            const packs = groupedData[currentState.artist];
            
            Object.keys(packs).sort().forEach(packName => {
                const icons = packs[packName];
                const count = icons.length;
                
                // Get 3 preview icons (prefer images over raw files)
                const previews = icons.filter(i => i.format === 'PNG' || i.format === 'Vector').slice(0, 3);
                
                let previewsHtml = `<div class="flex-1 flex items-center justify-center bg-gray-50 dark:bg-dark-900 text-gray-400"><i class="fa-solid fa-folder-open text-4xl"></i></div>`;
                
                if (previews.length > 0) {
                    previewsHtml = `<div class="flex items-center justify-center h-32 p-4 bg-checker gap-4">
                        ${previews.map(p => `<img src="${p.fullUrl}" class="w-1/3 max-h-20 object-contain drop-shadow-sm transition hover:scale-110" loading="lazy">`).join('')}
                    </div>`;
                }

                const card = document.createElement('div');
                card.className = "bg-white dark:bg-dark-800 border border-gray-200 dark:border-dark-700 rounded-xl overflow-hidden cursor-pointer hover:shadow-xl hover:-translate-y-1 transition group flex flex-col";
                card.onclick = () => openPack(packName);
                
                card.innerHTML = `
                    ${previewsHtml}
                    <div class="border-t border-gray-100 dark:border-dark-700 p-4 flex justify-between items-center bg-white dark:bg-dark-800">
                        <span class="text-blue-600 dark:text-blue-400 font-semibold text-sm truncate pr-2 group-hover:underline">${packName}</span>
                        <span class="text-gray-400 font-bold text-[10px] tracking-wider whitespace-nowrap bg-gray-100 dark:bg-dark-700 px-2 py-1 rounded">${count} ICONS</span>
                    </div>
                `;
                packsGrid.appendChild(card);
            });
        }

        function renderIconsList(sourceList) {
            updateBreadcrumbs();
            hideAllViews();
            iconsGrid.classList.remove('hidden');
            document.getElementById('noResults').classList.add('hidden');
            
            // Apply Format and Size Filters
            activeIconList = sourceList.filter(icon => {
                if (currentState.format !== 'all' && icon.format !== currentState.format) return false;
                if (currentState.size !== 'all' && icon.size !== currentState.size) return false;
                return true;
            });

            if (activeIconList.length === 0) {
                document.getElementById('noResults').classList.remove('hidden');
                iconsGrid.innerHTML = '';
                return;
            }

            currentRenderLimit = 100;
            iconsGrid.innerHTML = '';
            document.getElementById('scrollContainer').scrollTop = 0;
            renderIconChunk();
        }

        // PERFECT ICON CARD RENDERER (Matches Screenshot 1 & 2)
        function renderIconChunk() {
            const chunk = activeIconList.slice(iconsGrid.children.length, currentRenderLimit);
            const showDetails = currentState.showDetails;

            chunk.forEach(icon => {
                const isImage = ['PNG', 'Vector'].includes(icon.format);
                
                const card = document.createElement('div');
                // Base layout: white border, rounded, checkerboard inside
                card.className = "icon-card relative group flex flex-col bg-white dark:bg-dark-800 border border-gray-200 dark:border-dark-700 rounded-xl overflow-hidden shadow-sm hover:shadow-lg transition cursor-pointer";
                
                card.innerHTML = `
                    <!-- Image Area (Checkerboard) -->
                    <div class="flex-1 bg-checker p-6 flex items-center justify-center min-h-[120px]">
                        ${isImage ? 
                            `<img src="${icon.fullUrl}" class="max-w-full max-h-full object-contain transition-transform group-hover:scale-105 drop-shadow-sm" loading="lazy">` : 
                            `<i class="fa-solid fa-file text-4xl text-gray-400"></i>`
                        }
                    </div>
                    
                    <!-- Optional Details Bar -->
                    <div class="details-text text-center border-t border-gray-100 dark:border-dark-700 px-2 py-2 bg-white dark:bg-dark-800 ${showDetails ? '' : 'hidden'}">
                        <p class="text-[11px] font-medium text-gray-600 dark:text-gray-300 truncate" title="${icon.name}">${icon.name}</p>
                        <p class="text-[9px] font-bold text-gray-400 mt-0.5 uppercase">${icon.format} ${icon.size !== 'Vector' ? '• ' + icon.size : ''}</p>
                    </div>

                    <!-- HOVER OVERLAY (Matches Screenshot 1 EXACTLY) -->
                    <div class="overlay absolute inset-0 bg-gray-500/40 dark:bg-black/60 pointer-events-none flex flex-col justify-between">
                        
                        <!-- Top Right Actions -->
                        <div class="absolute top-2 right-2 flex gap-1.5 pointer-events-auto">
                            <button onclick="copyUrl('${icon.fullUrl}')" class="w-8 h-8 rounded-full bg-gray-800/80 text-white hover:bg-gray-900 flex items-center justify-center backdrop-blur-sm transition shadow" title="Copy URL">
                                <i class="fa-regular fa-copy text-sm"></i>
                            </button>
                            <button onclick="downloadIcon('${icon.fullUrl}', '${icon.name}')" class="w-8 h-8 rounded-full bg-gray-800/80 text-white hover:bg-gray-900 flex items-center justify-center backdrop-blur-sm transition shadow" title="Download">
                                <i class="fa-solid fa-download text-sm"></i>
                            </button>
                        </div>
                        
                        <!-- Bottom Center Action -->
                        <div class="absolute bottom-3 left-1/2 -translate-x-1/2 pointer-events-auto">
                            <button onclick="window.open('${icon.fullUrl}', '_blank')" class="bg-white text-gray-900 px-4 py-1.5 rounded-full text-xs font-bold shadow-lg hover:bg-gray-100 transition flex items-center gap-2 border border-gray-200">
                                Utiliser <i class="fa-solid fa-chevron-down text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                `;
                iconsGrid.appendChild(card);
            });
        }

        // --- FILTERS & INTERACTIVITY ---

        function hideAllViews() {
            artistsGrid.classList.add('hidden');
            packsGrid.classList.add('hidden');
            iconsGrid.classList.add('hidden');
        }

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        // Global Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                if (currentState.view === 'search') goHome();
                return;
            }
            
            currentState.view = 'search';
            sizeFilterContainer.classList.add('hidden');
            
            const results = allIcons.filter(icon => 
                `${icon.name} ${icon.set} ${icon.artist}`.toLowerCase().includes(query)
            );
            
            renderIconsList(results);
        });

        // Toggle Text Details
        toggleDetails.addEventListener('change', (e) => {
            currentState.showDetails = e.target.checked;
            document.querySelectorAll('.details-text').forEach(el => {
                if(currentState.showDetails) el.classList.remove('hidden');
                else el.classList.add('hidden');
            });
        });

        // Format Filters UI
        document.querySelectorAll('#formatFilters .filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#formatFilters .filter-btn').forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-gray-100', 'text-gray-600', 'dark:bg-dark-700', 'dark:text-gray-300');
                });
                e.target.classList.remove('bg-gray-100', 'text-gray-600', 'dark:bg-dark-700', 'dark:text-gray-300');
                e.target.classList.add('bg-blue-600', 'text-white');
                
                currentState.format = e.target.getAttribute('data-filter');
                if(currentState.view === 'icons' || currentState.view === 'search') {
                    renderIconsList(currentState.view === 'search' ? activeIconList : groupedData[currentState.artist][currentState.pack]);
                }
            });
        });

        // Dynamic Size Filters
        function renderSizeFilters() {
            if (availableSizes.size === 0) {
                sizeFilterContainer.classList.add('hidden');
                return;
            }
            sizeFilterContainer.classList.remove('hidden');
            
            const sizes = Array.from(availableSizes).sort((a, b) => parseInt(a) - parseInt(b));
            let html = `<button class="size-btn active px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-600 text-white shadow" data-size="all">All Sizes</button>`;
            
            sizes.forEach(size => {
                html += `<button class="size-btn px-3 py-1.5 rounded-lg text-sm font-medium bg-gray-100 dark:bg-dark-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 border border-gray-200 dark:border-dark-600" data-size="${size}">${size}</button>`;
            });
            sizeFilters.innerHTML = html;

            document.querySelectorAll('.size-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.size-btn').forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white');
                        b.classList.add('bg-gray-100', 'text-gray-600', 'dark:bg-dark-700', 'dark:text-gray-300');
                    });
                    e.target.classList.remove('bg-gray-100', 'text-gray-600', 'dark:bg-dark-700', 'dark:text-gray-300');
                    e.target.classList.add('bg-blue-600', 'text-white');
                    
                    currentState.size = e.target.getAttribute('data-size');
                    renderIconsList(groupedData[currentState.artist][currentState.pack]);
                });
            });
        }

        // Infinite Scroll
        document.getElementById('scrollContainer').addEventListener('scroll', function() {
            if (currentState.view !== 'icons' && currentState.view !== 'search') return;
            if (currentRenderLimit >= activeIconList.length) return;
            
            if (this.scrollTop + this.clientHeight >= this.scrollHeight - 200) {
                currentRenderLimit += 100;
                renderIconChunk();
            }
        });

        // --- UTILS (Copy & Download) ---
        function copyUrl(url) {
            navigator.clipboard.writeText(url).then(() => showToast("URL Copied to clipboard!"));
        }

        async function downloadIcon(url, filename) {
            try {
                showToast("Downloading...");
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (err) {
                window.open(url, '_blank');
            }
        }

        const toast = document.getElementById('toast');
        let toastTimeoutId;
        function showToast(msg) {
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-4');
            clearTimeout(toastTimeoutId);
            toastTimeoutId = setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 2500);
        }

        // Boot
        init();
    </script>
</body>
</html>

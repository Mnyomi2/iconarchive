<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Icon Gallery</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#121212', 800: '#1e1e1e', 700: '#2d2d2d' }
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <style>
        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(0, 0, 0, 0.15); 
            border-radius: 20px; 
            border: 1px solid transparent;
            background-clip: content-box;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.25); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Transparent Checkered Background (For Icons) */
        .bg-checker {
            background-color: #ffffff;
            background-image: 
                linear-gradient(45deg, #f1f5f9 25%, transparent 25%, transparent 75%, #f1f5f9 75%, #f1f5f9),
                linear-gradient(45deg, #f1f5f9 25%, transparent 25%, transparent 75%, #f1f5f9 75%, #f1f5f9);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        .dark .bg-checker {
            background-color: #1a1a1a;
            background-image: 
                linear-gradient(45deg, #222222 25%, transparent 25%, transparent 75%, #222222 75%, #222222),
                linear-gradient(45deg, #222222 25%, transparent 25%, transparent 75%, #222222 75%, #222222);
        }

        /* VS Code Style Sidebar (Narrower Small Version) */
        #sidebar { width: 3.5rem; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #sidebar.expanded { width: 12rem; }
        #sidebar .nav-text { opacity: 0; width: 0; overflow: hidden; transition: opacity 0.3s, width 0.3s; white-space: nowrap; }
        #sidebar.expanded .nav-text { opacity: 1; width: auto; margin-left: 1rem; }
        .dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }
        .dark ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        /* Sidebar Centering for Ubuntu Dock Style */
        #sidebar:not(.expanded) .nav-btn,
        #sidebar:not(.expanded) .sidebar-header,
        #sidebar:not(.expanded) .sidebar-footer {
            justify-content: center;
        }
        #sidebar.expanded .sidebar-header {
            justify-content: flex-start;
            padding: 0 1.25rem; /* Replicates original px-5 */
        }
        #sidebar.expanded .nav-btn {
            justify-content: flex-start;
        }
        #sidebar.expanded .sidebar-footer {
            justify-content: flex-end;
        }

        /* Ubuntu Dock Style */
        .nav-btn { 
            position: relative; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* The Dock Indicator Dot */
        .nav-btn::before {
            content: '';
            position: absolute;
            left: 4px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 4px;
            height: 12px;
            background: #3b82f6;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }
        .nav-btn.active::before {
            opacity: 1;
            height: 20px;
            transform: translateY(-50%) scale(1);
        }
        /* Click Animation */
        .nav-btn:active {
            transform: scale(0.9);
        }
        /* Hover Glow */
        .nav-btn:hover {
            background-color: rgba(59, 130, 246, 0.08) !important;
        }
        .dark .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.05) !important;
        }
        .nav-btn i {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nav-btn:hover i {
            transform: scale(1.2);
            color: #3b82f6 !important;
        }
        #sidebar:not(.expanded) .nav-btn {
            justify-content: center;
        }

        /* Modern Card Hover Animations */
        .icon-card .overlay { opacity: 0; transition: opacity 0.3s ease-in-out; }
        .icon-card:hover .overlay { opacity: 1; }
        .icon-card .action-btn { transform: translateY(10px); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s, color 0.2s; }
        .icon-card:hover .action-btn { transform: translateY(0); }
        
        .toast { transition: opacity 0.3s, transform 0.3s; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark-900 text-gray-900 dark:text-gray-100 h-screen flex overflow-hidden font-sans">

    <!-- VS CODE STYLE SIDEBAR -->
    <aside id="sidebar" class="bg-white dark:bg-dark-800 flex flex-col z-50 h-full shadow-md shrink-0 relative">
        
        <!-- Logo (Locked position, behaves like Nav Icons) -->
        <div onclick="document.getElementById('sidebarToggle').click()" class="h-14 flex items-center border-b border-gray-200 dark:border-dark-700 w-full overflow-hidden shrink-0 cursor-pointer group/brand hover:bg-gray-50 dark:hover:bg-dark-700/30 transition-colors">
            <div class="w-full flex items-center px-3">
                <div class="w-8 h-8 flex items-center justify-center bg-blue-600 rounded-lg text-white shrink-0 shadow-md transition-transform group-hover/brand:scale-110">
                    <i class="fa-solid fa-shapes text-sm"></i>
                </div>
                <h1 class="nav-text text-lg font-bold tracking-tight text-gray-900 dark:text-white">Icon<span class="text-blue-500 font-light">Gallery</span></h1>
            </div>
        </div>

        <!-- Navigation (Perfectly centered & larger icons) -->
        <nav class="flex-1 py-6 flex flex-col gap-4 px-0 overflow-x-hidden">
            <button onclick="navigate('all')" class="nav-btn flex items-center justify-center p-0 h-12 w-full transition-all group/btn relative" id="nav-all">
                <div class="w-full flex items-center px-4">
                    <i class="fa-solid fa-border-all text-[1.4rem] text-gray-400 group-hover/btn:text-blue-600 shrink-0"></i>
                    <span class="nav-text text-[15px] font-bold text-gray-600 dark:text-gray-400 group-hover/btn:text-gray-900 dark:group-hover/btn:text-white transition-colors">All Icons</span>
                </div>
            </button>
            
            <button onclick="navigate('designers')" class="nav-btn flex items-center justify-center p-0 h-12 w-full transition-all group/btn relative" id="nav-designers">
                <div class="w-full flex items-center px-4">
                    <i class="fa-solid fa-user-pen text-[1.4rem] text-gray-400 group-hover/btn:text-blue-600 shrink-0"></i>
                    <span class="nav-text text-[15px] font-bold text-gray-600 dark:text-gray-400 group-hover/btn:text-gray-900 dark:group-hover/btn:text-white transition-colors">Designers</span>
                </div>
            </button>
            
            <button onclick="navigate('iconpacks')" class="nav-btn flex items-center justify-center p-0 h-12 w-full transition-all group/btn relative" id="nav-iconpacks">
                <div class="w-full flex items-center px-4">
                    <i class="fa-solid fa-box-archive text-[1.4rem] text-gray-400 group-hover/btn:text-blue-600 shrink-0"></i>
                    <span class="nav-text text-[15px] font-bold text-gray-600 dark:text-gray-400 group-hover/btn:text-gray-900 dark:group-hover/btn:text-white transition-colors">Icon Packs</span>
                </div>
            </button>

            <!-- Tags Button -->
            <button onclick="openTagsModal()" class="nav-btn flex items-center justify-center p-0 h-12 w-full transition-all group/btn relative" id="nav-tags">
                <div class="w-full flex items-center px-4">
                    <i class="fa-solid fa-tags text-[1.4rem] text-gray-400 group-hover/btn:text-blue-600 shrink-0"></i>
                    <span class="nav-text text-[15px] font-bold text-gray-600 dark:text-gray-400 group-hover/btn:text-gray-900 dark:group-hover/btn:text-white transition-colors">Tags</span>
                </div>
            </button>
        </nav>

        <!-- Bottom Controls -->
        <div class="p-2 border-t border-gray-200 dark:border-dark-700 flex sidebar-footer">
            <!-- Expand/Collapse Toggle -->
            <button id="sidebarToggle" class="flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-700 transition" title="Toggle Sidebar">
                <i id="sidebarToggleIcon" class="fa-solid fa-chevron-right text-lg text-gray-500 transition-transform"></i>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0 bg-gray-50 dark:bg-dark-900 relative">
        
        <!-- Header Controls -->
        <header class="px-4 py-2 bg-white dark:bg-dark-800 shrink-0 flex flex-col gap-3 z-20">
            
            <div class="flex items-center justify-between gap-6">
                <!-- Dynamic Breadcrumbs -->
                <div id="breadcrumbs" class="text-sm font-semibold flex items-center gap-3 text-gray-500 dark:text-gray-400 overflow-x-auto no-scrollbar whitespace-nowrap">
                    <!-- Injected by JS -->
                </div>

                <div class="flex items-center gap-4 w-full max-w-md">
                    <!-- Global Search -->
                    <div class="relative w-full hidden sm:block">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-2.5 text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Search perfect icons..." 
                            class="w-full bg-gray-100 dark:bg-dark-700 border border-transparent focus:border-blue-500 dark:focus:border-blue-500 rounded-full pl-11 pr-4 py-2 outline-none transition shadow-sm text-sm">
                    </div>
                    
                    <!-- Theme Toggle -->
                    <button id="themeToggle" class="w-9 h-9 rounded-full bg-gray-100 dark:bg-dark-700 flex items-center justify-center text-gray-500 dark:text-yellow-400 hover:bg-gray-200 dark:hover:bg-dark-600 transition shrink-0 shadow-sm">
                        <i class="fa-solid fa-moon block dark:hidden text-lg"></i>
                        <i class="fa-solid fa-sun hidden dark:block text-lg"></i>
                    </button>
                </div>
            </div>

            <!-- Old Zoom Container Removed (Kept empty ID for safe JS rendering) -->
            <div id="advancedFilters" class="hidden"></div>
            
        </header>

        <!-- Scrollable Grid Area (Slightly more right padding for scrollbar breathing room) -->
        <div id="scrollContainer" class="flex-1 overflow-y-auto p-6 pr-4 relative">
            
            <div id="loading" class="absolute inset-0 flex flex-col items-center justify-center z-20">
                <i class="fa-solid fa-circle-notch fa-spin text-5xl text-blue-500 mb-4"></i>
            </div>

            <!-- Dynamic Grid -->
            <div id="mainGrid" class="grid gap-8">
                <!-- Cards Injected Here -->
            </div>
            
            <div id="scrollLoading" class="hidden text-center py-10">
                <i class="fa-solid fa-ellipsis fa-bounce text-3xl text-gray-400"></i>
            </div>
        </div>
    </main>

    <!-- Copy Toast (Perfectly Theme Matched) -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white dark:bg-dark-800 text-gray-900 dark:text-white font-bold px-6 py-3.5 rounded-2xl shadow-2xl border border-gray-200 dark:border-dark-700 opacity-0 translate-y-4 pointer-events-none z-[200] flex items-center gap-3 transition-all duration-300">
        <div class="w-8 h-8 rounded-full bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center shrink-0">
            <i class="fa-solid fa-circle-check text-blue-600 dark:text-blue-400 text-lg"></i>
        </div>
        <span id="toastMsg" class="text-sm tracking-tight">URL Copied Successfully!</span>
    </div>

    <!-- Floating UI Controls (Zoom & Scroll to Top) -->
    <div id="floatingControls" class="fixed bottom-6 right-6 z-[90] flex flex-col gap-3 items-center">
        <!-- Always Visible Zoom Controls (Compact Pill Design) -->
        <div id="floatingZoom" class="hidden flex-col items-center gap-1 bg-white/90 dark:bg-dark-800/90 backdrop-blur-md p-1.5 rounded-full shadow-lg border border-gray-200/60 dark:border-dark-700/60">
            <button onclick="zoomGrid('in')" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-dark-700 text-gray-600 dark:text-gray-300 transition-colors" title="Zoom In">
                <i class="fa-solid fa-plus text-xs"></i>
            </button>
            <div class="w-5 h-px bg-gray-200 dark:bg-dark-700"></div>
            <button onclick="zoomGrid('out')" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-dark-700 text-gray-600 dark:text-gray-300 transition-colors" title="Zoom Out">
                <i class="fa-solid fa-minus text-xs"></i>
            </button>
        </div>
        
        <!-- Scroll to Top (Compact Circular Design) -->
        <button id="scrollTopBtn" onclick="scrollToTop()" class="w-11 h-11 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-lg shadow-blue-500/20 hover:-translate-y-1 hover:shadow-blue-500/40 transition-all duration-300 opacity-0 translate-y-4 pointer-events-none">
            <i class="fa-solid fa-arrow-up text-sm"></i>
        </button>
    </div>

    <!-- Filter Modal (Frosted Glass) -->
    <div id="filterModal" class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-md opacity-0 transition-opacity duration-300 items-center justify-center p-4">
        <div class="bg-white dark:bg-dark-800 rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden border border-gray-200 dark:border-dark-700 transform scale-95 transition-transform duration-300 flex flex-col" id="filterModalContainer" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-gray-100 dark:border-dark-700 flex justify-between items-center bg-gray-50/50 dark:bg-dark-900/50 shrink-0">
                <h2 class="text-xl font-bold flex items-center gap-2 text-gray-900 dark:text-white">
                    <i class="fa-solid fa-filter text-blue-500"></i> Select Formats
                </h2>
                <button onclick="closeFilterModal()" class="text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 dark:hover:bg-dark-700">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="p-6 max-h-[60vh] overflow-y-auto">
                <div id="filterCheckboxes" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                    <!-- Checkboxes injected by JS -->
                </div>
            </div>
            <div class="p-5 border-t border-gray-100 dark:border-dark-700 flex justify-end gap-3 bg-gray-50/50 dark:bg-dark-900/50 shrink-0">
                <button onclick="clearFilters()" class="px-6 py-2.5 rounded-xl font-semibold text-gray-600 dark:text-gray-300 bg-white dark:bg-dark-800 border border-gray-200 dark:border-dark-600 hover:bg-gray-50 dark:hover:bg-dark-700 shadow-sm transition-all">Clear All</button>
                <button onclick="applyFilters()" class="px-6 py-2.5 rounded-xl font-semibold bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-500/30 transition-all flex items-center gap-2">
                    <i class="fa-solid fa-check"></i> Apply Filters
                </button>
            </div>
        </div>
    </div>

    <!-- Tags Modal (Frosted Glass) -->
    <div id="tagsModal" class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-md opacity-0 transition-opacity duration-300 items-center justify-center p-4" onclick="closeTagsModal()">
        <div class="bg-white dark:bg-dark-800 rounded-3xl shadow-2xl w-full max-w-4xl max-h-[80vh] flex flex-col overflow-hidden border border-gray-200 dark:border-dark-700 transform scale-95 transition-transform duration-300" id="tagsModalContainer" onclick="event.stopPropagation()">
            <div class="p-6 border-b border-gray-100 dark:border-dark-700 flex justify-between items-center bg-gray-50/50 dark:bg-dark-900/50 shrink-0 gap-4">
                <h2 class="text-xl font-bold flex items-center gap-2 text-gray-900 dark:text-white shrink-0">
                    <i class="fa-solid fa-tags text-blue-500"></i> Explore Tags
                </h2>
                <div class="relative w-full max-w-xs">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                    <input type="text" id="tagSearchInput" onkeyup="filterTagsModal()" placeholder="Search tags..." class="w-full bg-gray-100 dark:bg-dark-800 border border-transparent focus:border-blue-500 dark:focus:border-blue-500 rounded-full pl-9 pr-4 py-2 outline-none transition shadow-sm text-sm text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400">
                </div>
                <button onclick="closeTagsModal()" class="text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 dark:hover:bg-dark-700 shrink-0">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="p-6 sm:p-8 overflow-y-auto flex-1 flex flex-wrap gap-2 content-start" id="tagsModalContent">
                <!-- Tags injected here by JS -->
            </div>
        </div>
    </div>

    <!-- View Modal (Frosted Glass) -->
    <div id="viewModal" class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-md opacity-0 transition-opacity duration-300 items-center justify-center p-4 sm:p-10" onclick="closeModal()">
        <div id="modalContent" class="w-full flex justify-center items-center h-full max-h-[95vh]">
            <!-- Injected by JS -->
        </div>
    </div>

    <script>
       // --- CONFIGURATION ---
        const GITHUB_USERNAME = "Mnyomi2";
        const REPO_NAME = "iconarchive";
        const BRANCH = "main";

        const CDN_BASE = `https://cdn.jsdelivr.net/gh/${GITHUB_USERNAME}/${REPO_NAME}@${BRANCH}/`;

        // --- SMART FETCHER (Handles errors and caches flawlessly) ---
        async function fetchJSON(path, ignoreError = false) {
            // Attempt 1: jsDelivr CDN (Ultra-fast, globally distributed)
            try {
                const resCdn = await fetch(`${CDN_BASE}${path}`);
                if (resCdn.ok) return await resCdn.json();
            } catch (err) {}

            // Attempt 2: GitHub Raw as a safe fallback (In case CDN hasn't synced the latest commit)
            try {
                const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/${BRANCH}/${path}`);
                if (res.ok) return await res.json();
            } catch (err) {}
            
            if (ignoreError) return null;
            throw new Error(`Failed to load ${path}`);
        }

        // --- STATE MANAGEMENT ---
        let designersList = []; 
        let cachedPacks = {};   
        let cachedIcons = {};   
        
        let currentView = 'designers'; 
        let navState = { artist: null, pack: null };
        let activeFormatFilters = ['All']; 
        let tempFormatFilters = [];
        let currentZoomLevel = parseInt(localStorage.getItem('grid_zoom')) || 3; 
        let activeTag = null; 
        
        let allExtractedTags = [];
        let tagsExtracted = false;

        let displayList = [];
        let renderLimit = 50; 
        let isFetching = false;

        // DOM Elements
        const mainGrid = document.getElementById('mainGrid');
        const loading = document.getElementById('loading');
        const scrollContainer = document.getElementById('scrollContainer');
        const breadcrumbs = document.getElementById('breadcrumbs');
        const searchInput = document.getElementById('searchInput');

        // --- THEME & SIDEBAR TOGGLES ---
        const html = document.documentElement;
        if (localStorage.getItem('theme') === 'light') html.classList.remove('dark');
        else html.classList.add('dark');
        
        document.getElementById('themeToggle').addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });

        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebarToggleIcon = document.getElementById('sidebarToggleIcon');

        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('expanded');
            const isExpanded = sidebar.classList.contains('expanded');
            sidebarToggleIcon.className = isExpanded 
                ? "fa-solid fa-chevron-left text-xl text-gray-500 transition-transform" 
                : "fa-solid fa-chevron-right text-xl text-gray-500 transition-transform";
            localStorage.setItem('sidebar_expanded', isExpanded);
        });

        // --- CORE INITIALIZATION ---
        async function init() {
            // Restore Sidebar State
            if (localStorage.getItem('sidebar_expanded') === 'true') {
                sidebar.classList.add('expanded');
                sidebarToggleIcon.className = "fa-solid fa-chevron-left text-xl text-gray-500 transition-transform";
            }

            try {
                let rawData = await fetchJSON('master_index.json');
                
                // Safely handle master_index.json if it contains a flat list of icons
                if (rawData.length > 0 && rawData[0].artist) {
                    let designersMap = {};
                    rawData.forEach(icon => {
                        if (!designersMap[icon.artist]) {
                            designersMap[icon.artist] = {
                                id: icon.artist,
                                name: icon.artist.replace(/-/g, ' '),
                                packCount: 0,
                                iconCount: 0,
                                packs: new Set()
                            };
                        }
                        designersMap[icon.artist].iconCount++;
                        designersMap[icon.artist].packs.add(icon.set);
                    });
                    designersList = Object.values(designersMap).map(d => {
                        d.packCount = d.packs.size;
                        delete d.packs;
                        return d;
                    }).sort((a, b) => a.name.localeCompare(b.name));
                } else {
                    designersList = rawData; // Standard hierarchical list
                }

                loading.classList.add('hidden');
                
                // Try to restore the last view and active tag from refresh
                const savedNav = localStorage.getItem('iconGallery_nav');
                if (savedNav) {
                    const { view, artist, pack, activeTag: savedTag } = JSON.parse(savedNav);
                    if (savedTag) {
                        activeTag = savedTag;
                        navigate(view, artist, pack, true); // skipTagReset = true to keep the tag
                    } else {
                        navigate(view, artist, pack);
                    }
                } else {
                    navigate('all');
                }
            } catch (err) {
                loading.innerHTML = `<p class="text-red-500 font-bold text-xl">Failed to load API.</p>`;
                console.error(err);
            }
        }

        // --- API FETCHERS ---
        async function fetchDesignerPacks(artistId) {
            if (cachedPacks[artistId]) return cachedPacks[artistId];
            const packs = await fetchJSON(`data/designers/${artistId}.json`);
            cachedPacks[artistId] = packs;
            return packs;
        }

        async function fetchPackIcons(artistId, packId) {
            const cacheKey = `${artistId}/${packId}`;
            if (cachedIcons[cacheKey]) return cachedIcons[cacheKey];
            
            const [iconsData, externalTagsData] = await Promise.all([
                fetchJSON(`data/packs/${artistId}/${packId}.json`),
                fetchJSON(`Designer/${artistId}/${packId}/tags.json`, true)
            ]);
            
            let icons = iconsData || [];
            let externalTags = externalTagsData || {};
            
            icons = icons.map(icon => {
                // Improved size detection: only matches numeric dots at the end before extension
                const sizeMatch = icon.name.match(/\.((\d+x\d+)|\d+)\.(png|ico|icns|svg)$/i);
                const specificSize = sizeMatch ? sizeMatch[1] + 'px' : null;
                
                // Grouping Logic: Detect if the dot is a name separator or a size separator
                const parts = icon.name.split('.');
                const ext = parts.pop();
                if (parts.length > 0 && /^((\d+x\d+)|\d+)$/.test(parts[parts.length-1])) {
                    parts.pop(); // Remove the size part from the grouping ID
                }
                const groupKey = parts.join('.').toLowerCase();
                icon.groupKey = groupKey;

                let baseFormat = icon.format;
                if (baseFormat.toUpperCase() === 'ICO') baseFormat = 'Windows';
                if (baseFormat.toUpperCase() === 'ICNS') baseFormat = 'Mac';
                
                let exactFormat = specificSize ? `${baseFormat}-${specificSize}` : baseFormat;
                if (icon.name.toLowerCase().includes('favicon')) exactFormat = 'Favicon';
                
                let iconBaseName = icon.name.split('.')[0];
                
                // Matches tags correctly whether they are embedded or external
                let iconTags = icon.tags || externalTags[iconBaseName] || externalTags[icon.name] || [];
                
                return { ...icon, specificSize, exactFormat, artist: artistId, set: packId, tags: iconTags };
            });
            
            cachedIcons[cacheKey] = icons;
            return icons;
        }

        // --- NAVIGATION ENGINE ---
        async function navigate(view, artist = null, pack = null, skipTagReset = false) {
            currentView = view;
            navState = { artist, pack };
            
            if (!skipTagReset) {
                activeTag = null;
                searchInput.value = '';
            }

            // Save state to remember after refresh
            localStorage.setItem('iconGallery_nav', JSON.stringify({ view, artist, pack, activeTag }));
            
            updateBreadcrumbs();
            updateSidebarHighlight();
            
            if (view === 'icons' || view === 'all') {
                document.getElementById('floatingZoom').classList.remove('hidden');
                document.getElementById('floatingZoom').classList.add('flex');
                applyZoom();
            } else {
                document.getElementById('floatingZoom').classList.add('hidden');
                document.getElementById('floatingZoom').classList.remove('flex');
                mainGrid.className = "grid gap-8 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4";
            }

            loading.classList.remove('hidden');
            mainGrid.innerHTML = ''; // clear quickly
            await filterAndRender();
            loading.classList.add('hidden');
        }

        function searchByTag(tag) {
            closeModal();
            activeTag = tag;
            searchInput.value = ''; 
            navigate('all', null, null, true);
        }

        function updateBreadcrumbs() {
            let htmlText = `<button onclick="navigate('designers')" class="hover:text-blue-600 dark:hover:text-blue-400 transition flex items-center gap-2"><i class="fa-solid fa-house"></i> Home</button>`;
            
            if (currentView === 'all') {
                if (activeTag) {
                    htmlText += ` <i class="fa-solid fa-chevron-right text-[10px] text-gray-300 dark:text-gray-600"></i> <span class="text-gray-900 dark:text-gray-100">Tag: <span class="text-blue-500 font-bold">${activeTag}</span></span>`;
                } else {
                    htmlText += ` <i class="fa-solid fa-chevron-right text-[10px] text-gray-300 dark:text-gray-600"></i> <span class="text-gray-900 dark:text-gray-100">All Icons</span>`;
                }
            }
            if (currentView === 'designers') htmlText += ` <i class="fa-solid fa-chevron-right text-[10px] text-gray-300 dark:text-gray-600"></i> <span class="text-gray-900 dark:text-gray-100">Designers</span>`;
            if (currentView === 'iconpacks') htmlText += ` <i class="fa-solid fa-chevron-right text-[10px] text-gray-300 dark:text-gray-600"></i> <span class="text-gray-900 dark:text-gray-100">Icon Packs</span>`;
            
            if (navState.artist) {
                const artistName = navState.artist.replace(/-/g, ' ');
                htmlText += ` <i class="fa-solid fa-chevron-right text-[10px] text-gray-300 dark:text-gray-600"></i> <button onclick="navigate('packs', '${navState.artist}')" class="hover:text-blue-600 dark:hover:text-blue-400 transition capitalize">${artistName}</button>`;
            }
            if (navState.pack) {
                const packName = navState.pack.replace(/-/g, ' ');
                htmlText += ` <i class="fa-solid fa-chevron-right text-[10px] text-gray-300 dark:text-gray-600"></i> <span class="text-gray-900 dark:text-gray-100 capitalize">${packName}</span>`;
            }
            breadcrumbs.innerHTML = htmlText;
        }

        function updateSidebarHighlight() {
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active', 'bg-blue-50/50', 'dark:bg-blue-900/10');
                b.querySelector('i').classList.replace('text-blue-600', 'text-gray-400');
            });
            
            let activeId = '';
            // If we are actively filtering by a Tag, highlight the Tags sidebar button
            if (activeTag) {
                activeId = 'nav-tags';
            } else if (currentView === 'all') {
                activeId = 'nav-all';
            } else if (currentView === 'designers') {
                activeId = 'nav-designers';
            } else if (['iconpacks', 'packs'].includes(currentView)) {
                activeId = 'nav-iconpacks';
            }

            if (activeId) {
                const el = document.getElementById(activeId);
                if (el) {
                    el.classList.add('active', 'bg-blue-50/50', 'dark:bg-blue-900/10');
                    el.querySelector('i').classList.replace('text-gray-400', 'text-blue-600');
                }
            }
        }

        // --- FILTERING & DATA PREP ---
        async function filterAndRender() {
            const query = searchInput.value.toLowerCase();
            renderLimit = 50; 
            scrollContainer.scrollTop = 0;

            if (currentView === 'designers') {
                displayList = designersList.filter(d => d.name.toLowerCase().includes(query));
            } 
            else if (currentView === 'iconpacks') {
                displayList = [];
                const packPromises = designersList.map(async d => {
                    const packs = await fetchDesignerPacks(d.id);
                    return packs.map(p => ({ artist: d.id, pack: p.id, name: p.name, iconCount: p.iconCount }));
                });
                const allPacksArr = await Promise.all(packPromises);
                displayList = allPacksArr.flat().filter(p => p.name.toLowerCase().includes(query)).sort((a, b) => a.name.localeCompare(b.name));
            }
            else if (currentView === 'packs') {
                const packs = await fetchDesignerPacks(navState.artist);
                displayList = packs.filter(p => p.name.toLowerCase().includes(query)).map(p => ({
                    artist: navState.artist, pack: p.id, name: p.name, iconCount: p.iconCount
                }));
            } 
            else if (currentView === 'icons') {
                const icons = await fetchPackIcons(navState.artist, navState.pack);
                
                let groupedVariants = {};
                icons.forEach(i => {
                    let key = i.groupKey;
                    if(!groupedVariants[key]) groupedVariants[key] = [];
                    groupedVariants[key].push(i);
                });

                displayList = [];
                Object.values(groupedVariants).forEach(variants => {
                    let matchQ = false;
                    if (activeTag) {
                        matchQ = variants.some(i => i.tags && Array.isArray(i.tags) && i.tags.some(t => t.toLowerCase() === activeTag.toLowerCase()));
                    } else {
                        matchQ = variants.some(i => `${i.name} ${i.artist} ${i.set}`.toLowerCase().includes(query) || (i.tags && Array.isArray(i.tags) && i.tags.some(t => t.toLowerCase().includes(query))));
                    }
                    if (matchQ) displayList.push(variants);
                });
            }
            else if (currentView === 'all') {
                displayList = [];
                let allGroupedVariants = {};
                
                const allPacksData = await Promise.all(designersList.map(async d => {
                    const packs = await fetchDesignerPacks(d.id);
                    return packs.map(p => ({ artist: d.id, pack: p.id }));
                }));
                const flatPacks = allPacksData.flat();
                
                const chunkSize = 25;
                for (let i = 0; i < flatPacks.length; i += chunkSize) {
                    const chunk = flatPacks.slice(i, i + chunkSize);
                    await Promise.all(chunk.map(async ({ artist, pack }) => {
                        const icons = await fetchPackIcons(artist, pack);
                        icons.forEach(i => {
                            let fullKey = `${artist}-${pack}-${i.groupKey}`; 
                            if(!allGroupedVariants[fullKey]) allGroupedVariants[fullKey] = [];
                            allGroupedVariants[fullKey].push(i);
                        });
                    }));
                }

                Object.values(allGroupedVariants).forEach(variants => {
                    let matchQ = false;
                    if (activeTag) {
                        matchQ = variants.some(i => i.tags && Array.isArray(i.tags) && i.tags.some(t => t.toLowerCase() === activeTag.toLowerCase()));
                    } else {
                        matchQ = variants.some(i => `${i.name} ${i.artist} ${i.set}`.toLowerCase().includes(query) || (i.tags && Array.isArray(i.tags) && i.tags.some(t => t.toLowerCase().includes(query))));
                    }
                    if (matchQ) displayList.push(variants);
                });
            }

            mainGrid.innerHTML = '';
            renderChunk();
        }

        searchInput.addEventListener('input', () => { activeTag = null; filterAndRender(); });

        // --- TAGS MODAL LOGIC ---
        async function openTagsModal() {
            const tagsModal = document.getElementById('tagsModal');
            const tagsModalContainer = document.getElementById('tagsModalContainer');
            const content = document.getElementById('tagsModalContent');
            
            // Highlight sidebar button while modal is open
            const tagBtn = document.getElementById('nav-tags');
            tagBtn.classList.add('active', 'bg-blue-50/50', 'dark:bg-blue-900/10');
            tagBtn.querySelector('i').classList.replace('text-gray-400', 'text-blue-600');

            tagsModal.classList.remove('hidden');
            tagsModal.classList.add('flex');
            setTimeout(() => {
                tagsModal.classList.remove('opacity-0');
                tagsModalContainer.classList.remove('scale-95');
                tagsModalContainer.classList.add('scale-100');
            }, 10);

            if (!tagsExtracted) {
                content.innerHTML = `<div class="w-full h-40 flex flex-col items-center justify-center gap-3 text-gray-500"><i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500"></i><p class="font-medium animate-pulse">Gathering global tags...</p></div>`;
                
                let tagsSet = new Set();
                
                const allPacksData = await Promise.all(designersList.map(async d => {
                    const packs = await fetchDesignerPacks(d.id);
                    return packs.map(p => ({ artist: d.id, pack: p.id }));
                }));
                const flatPacks = allPacksData.flat();
                
                const chunkSize = 25;
                for (let i = 0; i < flatPacks.length; i += chunkSize) {
                    const chunk = flatPacks.slice(i, i + chunkSize);
                    await Promise.all(chunk.map(async ({ artist, pack }) => {
                        const icons = await fetchPackIcons(artist, pack);
                        icons.forEach(i => {
                            if (i.tags) {
                                if (Array.isArray(i.tags)) i.tags.forEach(t => tagsSet.add(t));
                                else if (typeof i.tags === 'string') i.tags.split(',').forEach(t => tagsSet.add(t.trim()));
                            }
                        });
                    }));
                }
                
                allExtractedTags = Array.from(tagsSet).sort((a,b) => a.toLowerCase().localeCompare(b.toLowerCase()));
                tagsExtracted = true;
            }
            renderTagsModalContent();
        }

        function renderTagsModalContent(filter = '') {
            const content = document.getElementById('tagsModalContent');
            const filtered = allExtractedTags.filter(t => t.toLowerCase().includes(filter.toLowerCase()));
            
            if (filtered.length === 0) {
                content.innerHTML = `<div class="w-full text-center py-10 text-gray-400 font-medium">No matching tags found.</div>`;
            } else {
                // The "grow" class ensures every row stretches perfectly edge-to-edge
                let html = filtered.map(t => `
                    <button onclick="searchByTag('${t.replace(/'/g, "\\'")}'); closeTagsModal();" 
                        class="grow px-4 py-2 bg-gray-50 dark:bg-dark-700/50 hover:bg-blue-600 dark:hover:bg-blue-600 text-gray-700 dark:text-gray-200 hover:text-white text-sm font-semibold rounded-xl transition-all border border-gray-200 dark:border-white/5 shadow-sm hover:shadow-blue-500/20 hover:-translate-y-0.5 active:scale-95 text-center truncate">
                        ${t}
                    </button>
                `).join('');
                
                // Add invisible spacers so the last row doesn't stretch too massively
                for(let i=0; i<10; i++) {
                    html += `<div class="grow-[10] h-0"></div>`;
                }
                
                content.innerHTML = html;
            }
        }

        function filterTagsModal() { renderTagsModalContent(document.getElementById('tagSearchInput').value); }

        function closeTagsModal() {
            const tagsModal = document.getElementById('tagsModal');
            const tagsModalContainer = document.getElementById('tagsModalContainer');
            
            // Revert sidebar highlight based on current view
            updateSidebarHighlight();

            tagsModal.classList.add('opacity-0');
            tagsModalContainer.classList.remove('scale-100');
            tagsModalContainer.classList.add('scale-95');
            setTimeout(() => { 
                tagsModal.classList.add('hidden'); 
                tagsModal.classList.remove('flex'); 
                document.getElementById('tagSearchInput').value = '';
            }, 300);
        }

        // --- FILTER MODAL (Kept UI Intact) ---
        const filterModal = document.getElementById('filterModal');
        const filterModalContainer = document.getElementById('filterModalContainer');

        function openFilterModal() {
            tempFormatFilters = [...activeFormatFilters];
            renderFilterCheckboxes();
            filterModal.classList.remove('hidden');
            filterModal.classList.add('flex');
            setTimeout(() => {
                filterModal.classList.remove('opacity-0');
                filterModalContainer.classList.remove('scale-95');
                filterModalContainer.classList.add('scale-100');
            }, 10);
        }

        function closeFilterModal() {
            filterModal.classList.add('opacity-0');
            filterModalContainer.classList.remove('scale-100');
            filterModalContainer.classList.add('scale-95');
            setTimeout(() => { filterModal.classList.add('hidden'); filterModal.classList.remove('flex'); }, 300);
        }

        function renderFilterCheckboxes() {
            const container = document.getElementById('filterCheckboxes');
            let formats = ['Vector', 'PNG', 'Favicon', 'Windows', 'Mac']; // Fast Defaults
            
            if (currentView === 'icons') {
                const cacheKey = `${navState.artist}/${navState.pack}`;
                if(cachedIcons[cacheKey]) formats = [...new Set(cachedIcons[cacheKey].map(i => i.exactFormat))].sort();
            }
            
            let htmlText = createCheckboxHTML('All', 'All Formats', tempFormatFilters.includes('All'));
            formats.forEach(f => htmlText += createCheckboxHTML(f, f.replace('-', ' ('), tempFormatFilters.includes(f)));
            container.innerHTML = htmlText;
        }

        function createCheckboxHTML(value, label, isChecked) {
            return `
                <label class="flex items-center gap-3 p-3 rounded-xl border ${isChecked ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' : 'border-gray-200 dark:border-dark-700 bg-white dark:bg-dark-800'} cursor-pointer hover:border-blue-400 transition-all select-none group">
                    <div class="relative flex items-center justify-center w-5 h-5 shrink-0">
                        <input type="checkbox" value="${value}" ${isChecked ? 'checked' : ''} onchange="toggleFilter(this.value)" class="peer appearance-none w-5 h-5 border-2 border-gray-300 dark:border-dark-600 rounded checked:border-blue-500 checked:bg-blue-500 transition-colors cursor-pointer" />
                        <i class="fa-solid fa-check absolute text-white text-[10px] pointer-events-none opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                    </div>
                    <span class="text-sm font-semibold ${isChecked ? 'text-blue-700 dark:text-blue-400' : 'text-gray-700 dark:text-gray-300'} truncate">${label}</span>
                </label>
            `;
        }

        function toggleFilter(val) {
            if (val === 'All') tempFormatFilters = ['All'];
            else {
                tempFormatFilters = tempFormatFilters.filter(f => f !== 'All');
                if (tempFormatFilters.includes(val)) tempFormatFilters = tempFormatFilters.filter(f => f !== val);
                else tempFormatFilters.push(val);
                if (tempFormatFilters.length === 0) tempFormatFilters = ['All']; 
            }
            renderFilterCheckboxes();
        }

        function applyFilters() { activeFormatFilters = [...tempFormatFilters]; closeFilterModal(); filterAndRender(); }
        function clearFilters() { tempFormatFilters = ['All']; renderFilterCheckboxes(); }

        filterModal.addEventListener('click', closeFilterModal);

        // --- RENDERING ENGINE ---
        function renderChunk() {
            const chunk = displayList.slice(mainGrid.children.length, renderLimit);
            
            if(chunk.length === 0 && mainGrid.children.length === 0) {
                mainGrid.innerHTML = `<div class="col-span-full text-center py-24 text-gray-400 font-medium text-lg"><div class="bg-gray-100 dark:bg-dark-800 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fa-regular fa-folder-open text-4xl"></i></div>No results found.</div>`;
                return;
            }

            chunk.forEach((item) => {
                const globalIndex = displayList.indexOf(item); 
                if (currentView === 'designers') mainGrid.appendChild(createDesignerCard(item));
                else if (currentView === 'iconpacks' || currentView === 'packs') mainGrid.appendChild(createPackCard(item));
                else mainGrid.appendChild(createIconCard(item, globalIndex));
            });
            isFetching = false;
        }

        // --- CARD RENDERERS ---
        function createDesignerCard(designer) {
            const div = document.createElement("div");
            div.className = "bg-white dark:bg-dark-800 border border-gray-200 dark:border-dark-700 rounded-2xl p-5 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 cursor-pointer group flex items-center gap-4";
            div.onclick = () => navigate("packs", designer.id);

            div.innerHTML = `
                <div class="w-14 h-14 shrink-0 bg-blue-50 dark:bg-blue-900/20 rounded-xl flex items-center justify-center group-hover:scale-105 transition-transform duration-300">
                    <i class="fa-solid fa-pen-nib text-xl text-blue-600 dark:text-blue-400"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="font-semibold text-base text-gray-900 dark:text-white truncate">${designer.name}</h3>
                    <div class="flex items-center gap-2 mt-2 flex-wrap">
                        <span class="text-xs px-2 py-1 rounded-lg bg-gray-100 dark:bg-dark-700 text-gray-600 dark:text-gray-300">${designer.packCount} Packs</span>
                        <span class="text-xs px-2 py-1 rounded-lg bg-gray-100 dark:bg-dark-700 text-gray-600 dark:text-gray-300">${designer.iconCount} Icons</span>
                    </div>
                </div>
            `;
            return div;
        }

        function createPackCard(packData) {
            const div = document.createElement('div');
            div.className = "bg-white dark:bg-dark-800 border border-gray-200 dark:border-dark-700 rounded-3xl hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 cursor-pointer group overflow-hidden flex flex-col";
            div.onclick = () => navigate('icons', packData.artist, packData.pack);
            
            div.innerHTML = `
                <div class="h-40 bg-checker border-b border-gray-100 dark:border-dark-700 flex items-center justify-center gap-2 p-4 relative preview-container">
                    <div class="absolute inset-0 bg-gradient-to-t from-white/60 to-transparent dark:from-dark-900/60 pointer-events-none z-0"></div>
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-gray-300 relative z-10"></i>
                </div>
                <div class="p-5 flex justify-between items-center bg-white dark:bg-dark-800 relative z-20">
                    <div class="w-2/3">
                        <h3 class="font-bold text-base sm:text-lg text-gray-900 dark:text-white truncate capitalize">${packData.name}</h3>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-0.5 truncate">${packData.artist.replace(/-/g, ' ')}</p>
                    </div>
                    <span class="text-[10px] font-black uppercase tracking-wider text-blue-600 bg-blue-50 dark:bg-blue-900/30 dark:text-blue-400 px-2.5 py-1.5 rounded-lg shrink-0">${packData.iconCount} ICONS</span>
                </div>
            `;

            // Lazy Load Previews smoothly without crashing
            fetchPackIcons(packData.artist, packData.pack).then(icons => {
                const getPriority = (i) => i.exactFormat === 'Vector' ? 1 : i.exactFormat.includes('PNG-64px') ? 2 : i.exactFormat.startsWith('Win') ? 3 : 4;
                const uniqueMap = {};
                icons.forEach(icon => {
                    const baseName = icon.name.split('.')[0].toLowerCase();
                    if (!uniqueMap[baseName] || getPriority(icon) < getPriority(uniqueMap[baseName])) uniqueMap[baseName] = icon;
                });

                const previews = Object.values(uniqueMap).sort((a, b) => getPriority(a) - getPriority(b)).slice(0, 4);
                let previewHtml = `<div class="absolute inset-0 bg-gradient-to-t from-white/60 to-transparent dark:from-dark-900/60 pointer-events-none z-0"></div>`;
                
                previews.forEach((p, idx) => {
                    const url = `${CDN_BASE}${p.path}`;
                    const hoverRotate = idx % 2 === 0 ? 'group-hover:-rotate-6' : 'group-hover:rotate-6';
                    const containerClasses = `w-16 h-16 sm:w-[4.5rem] sm:h-[4.5rem] flex items-center justify-center bg-white/95 dark:bg-dark-800/95 backdrop-blur-md rounded-2xl shadow-lg border border-gray-200/30 dark:border-dark-600/30 group-hover:-translate-y-1 ${hoverRotate} transition-all duration-300 z-10 relative shrink-0`;

                    if (p.exactFormat.startsWith('Mac')) previewHtml += `<div class="${containerClasses}"><i class="fa-brands fa-apple text-3xl text-gray-400 dark:text-gray-500"></i></div>`;
                    else if (p.exactFormat.startsWith('Win')) previewHtml += `<div class="${containerClasses}"><i class="fa-brands fa-windows text-3xl text-gray-400 dark:text-gray-500"></i></div>`;
                    else previewHtml += `<div class="${containerClasses}"><img src="${url}" class="w-11 h-11 sm:w-12 sm:h-12 object-contain drop-shadow-md" loading="lazy"></div>`;
                });
                
                if(previews.length === 0) previewHtml += `<i class="fa-solid fa-folder-open text-5xl text-gray-300 z-10"></i>`;
                const previewContainer = div.querySelector('.preview-container');
                if(previewContainer) previewContainer.innerHTML = previewHtml;
            });

            return div;
        }

        function createIconCard(variants, index) {
            let previewIcon = variants.find(v => v.exactFormat === 'Vector') || variants.find(v => v.exactFormat.includes('PNG')) || variants[0];
            const fullUrl = CDN_BASE + previewIcon.path;
            const isMac = previewIcon.exactFormat.startsWith('Mac');
            const isWindows = previewIcon.exactFormat.startsWith('Win');
            
            let preview = '';
            if (isMac) preview = `<i class="fa-brands fa-apple text-7xl text-gray-300/40 dark:text-gray-600/40 transition-transform duration-500 group-hover:scale-110"></i>`;
            else if (isWindows) preview = `<i class="fa-brands fa-windows text-7xl text-gray-300/40 dark:text-gray-600/40 transition-transform duration-500 group-hover:scale-110"></i>`;
            else preview = `<img src="${fullUrl}" class="w-full h-full object-contain transition-transform duration-500 group-hover:scale-110 drop-shadow-sm" loading="lazy">`;

            const baseName = previewIcon.name.split('.')[0];
            const div = document.createElement('div');
            
            div.className = "icon-card bg-checker border border-gray-200 dark:border-dark-700 rounded-[2rem] relative aspect-square group overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-300 cursor-pointer";
            div.onclick = () => openModal(index);
            
            div.innerHTML = `
                <div class="absolute inset-5 flex items-center justify-center">${preview}</div>
                <div class="absolute top-3 left-3 px-2 py-0.5 rounded-md text-[9px] font-black uppercase tracking-wider bg-white/90 dark:bg-dark-800/90 text-gray-800 dark:text-gray-200 shadow-sm backdrop-blur-md border border-gray-200 dark:border-dark-600 z-10">
                    ${variants.length} Formats
                </div>
                <div class="overlay absolute inset-0 bg-white/40 dark:bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center">
                    <div class="w-14 h-14 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-xl transform group-hover:scale-110 transition-transform duration-300 -translate-y-2 group-hover:translate-y-0">
                        <i class="fa-solid fa-layer-group text-2xl"></i>
                    </div>
                    <div class="absolute bottom-0 left-0 right-0 translate-y-4 group-hover:translate-y-0 transition-all duration-300 opacity-0 group-hover:opacity-100">
                        <div class="w-full py-2 bg-white/[0.05] backdrop-blur-3xl border-t border-white/5 text-center">
                            <span class="text-[10px] font-black tracking-widest text-gray-900 dark:text-white truncate block px-4 uppercase drop-shadow-sm">${baseName}</span>
                        </div>
                    </div>
                </div>
            `;
            return div;
        }

        // Infinite Scroll
        scrollContainer.addEventListener('scroll', () => {
            const scrollTopBtn = document.getElementById('scrollTopBtn');
            if (scrollContainer.scrollTop > 400) scrollTopBtn.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            else scrollTopBtn.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');

            if (isFetching || renderLimit >= displayList.length) return;
            if (scrollContainer.scrollTop + scrollContainer.clientHeight >= scrollContainer.scrollHeight - 150) {
                isFetching = true; renderLimit += 50; renderChunk();
            }
        });

        function scrollToTop() { scrollContainer.scrollTo({ top: 0, behavior: 'smooth' }); }

        // --- UTILITIES ---
        function copyUrl(url) { navigator.clipboard.writeText(url).then(() => showToast("CDN URL Copied Successfully!")); }
        async function downloadIcon(url, filename) {
            try {
                showToast("Starting Download...");
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl; a.download = filename;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (err) { window.open(url, '_blank'); }
        }
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 2500);
        }

        // --- ZOOM LOGIC ---
        const gridZoomClasses = {
            1: "grid gap-4 grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 xl:grid-cols-12",
            2: "grid gap-5 grid-cols-3 sm:grid-cols-5 md:grid-cols-7 lg:grid-cols-8 xl:grid-cols-10",
            3: "grid gap-6 grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 2xl:grid-cols-7",
            4: "grid gap-8 grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-5",
            5: "grid gap-10 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-4"
        };

        function zoomGrid(action) {
            if(action === 'in' && currentZoomLevel < 5) currentZoomLevel++;
            if(action === 'out' && currentZoomLevel > 1) currentZoomLevel--;
            localStorage.setItem('grid_zoom', currentZoomLevel);
            applyZoom();
        }
        function applyZoom() {
            if(currentView === 'icons' || currentView === 'all') mainGrid.className = gridZoomClasses[currentZoomLevel];
        }

        // --- COMPREHENSIVE VIEWER MODAL LOGIC ---
        const viewModal = document.getElementById('viewModal');
        const modalContent = document.getElementById('modalContent');

        function toggleModalTags(e) {
            if (e) e.stopPropagation();
            const list = document.getElementById('iconTagsList');
            if (!list) return;

            if (list.classList.contains('opacity-0')) {
                list.classList.remove('hidden');
                void list.offsetWidth; 
                list.classList.remove('opacity-0', 'translate-y-2');
                list.classList.add('opacity-100', 'translate-y-0', 'flex');
            } else {
                closeModalTags();
            }
        }

        function closeModalTags() {
            const list = document.getElementById('iconTagsList');
            if (list && !list.classList.contains('opacity-0')) {
                list.classList.remove('opacity-100', 'translate-y-0');
                list.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => list.classList.add('hidden'), 300);
            }
        }

        
        // --- IMAGE ZOOM TRACKING LOGIC ---
        function handleModalZoom(e, el) {
            const rect = el.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            const target = el.firstElementChild;
            if (target) target.style.transformOrigin = `${x}% ${y}%`;
        }

        function resetModalZoom(el) {
            const target = el.firstElementChild;
            if (target) target.style.transformOrigin = 'center center';
        }

        function openModal(index) {
            const variants = displayList[index];
            let previewIcon = variants.find(v => v.exactFormat === 'Vector') || variants.find(v => v.exactFormat.includes('PNG')) || variants[0];
            const fullUrl = CDN_BASE + previewIcon.path;
            const isMac = previewIcon.exactFormat.startsWith('Mac');
            const isWindows = previewIcon.exactFormat.startsWith('Win');
            
            // Added CSS transition and group-hover scaling for the zoom effect
            let preview = '';
            if (isMac) preview = `<i class="fa-brands fa-apple text-[14rem] text-gray-300 dark:text-gray-600 drop-shadow-xl transition-transform duration-200 ease-out group-hover:scale-[2]"></i>`;
            else if (isWindows) preview = `<i class="fa-brands fa-windows text-[14rem] text-gray-300 dark:text-gray-600 drop-shadow-xl transition-transform duration-200 ease-out group-hover:scale-[2]"></i>`;
            else preview = `<img src="${fullUrl}" class="w-full h-full object-contain drop-shadow-2xl transition-transform duration-200 ease-out group-hover:scale-[2]">`;

            const sortedVariants = [...variants].sort((a,b) => {
                const getScore = (f) => f==='Vector'?1 : f.includes('PNG')?2 : f.includes('Mac')?3 : f.includes('Win')?4 : 5;
                return getScore(a.exactFormat) - getScore(b.exactFormat);
            });

            let formatsHtml = '';
            sortedVariants.forEach(v => {
                const vUrl = CDN_BASE + v.path;
                formatsHtml += `
                    <div class="flex items-center justify-between p-3 px-4 rounded-xl bg-white dark:bg-dark-800 border border-gray-100 dark:border-dark-700 hover:border-blue-400 dark:hover:border-blue-500/50 transition-colors shadow-sm">
                        <span class="font-black text-xs text-gray-800 dark:text-gray-200 uppercase tracking-wider">${v.exactFormat}</span>
                        <div class="flex gap-2">
                            <button onclick="copyUrl('${vUrl}'); event.stopPropagation(); closeModalTags();" class="w-8 h-8 rounded-lg bg-gray-50 dark:bg-dark-900/50 border border-gray-200 dark:border-dark-600 text-gray-600 dark:text-gray-300 hover:text-blue-600 hover:border-blue-500 flex items-center justify-center transition-all shadow-sm" title="Copy URL">
                                <i class="fa-regular fa-copy text-xs"></i>
                            </button>
                            <button onclick="downloadIcon('${vUrl}', '${v.name}'); event.stopPropagation(); closeModalTags();" class="w-8 h-8 rounded-lg bg-gray-900 dark:bg-white text-white dark:text-gray-900 hover:scale-105 flex items-center justify-center transition-transform shadow-md" title="Download">
                                <i class="fa-solid fa-download text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            const baseName = previewIcon.groupKey.replace(/-/g, ' ');

            let allTags = [];
            variants.forEach(v => {
                if (v.tags) {
                    if (Array.isArray(v.tags)) {
                        allTags.push(...v.tags);
                    } else if (typeof v.tags === 'string') {
                        allTags.push(...v.tags.split(',').map(t => t.trim()));
                    }
                }
            });
            const uniqueTags = [...new Set(allTags)].filter(t => t && t.trim() !== '');
            
            let tagsBtnHtml = '';

            if (uniqueTags.length > 0) {
                let tagsHtml = uniqueTags.map(t => `
                    <button onclick="searchByTag('${t.replace(/'/g, "\\'")}'); closeModal();" class="grow px-3 py-1.5 bg-white dark:bg-dark-800 hover:bg-blue-600 dark:hover:bg-blue-600 text-gray-700 dark:text-gray-200 hover:text-white text-xs font-semibold rounded-xl transition-all border border-gray-200 dark:border-dark-600 shadow-sm hover:shadow-blue-500/20 active:scale-95 text-center truncate">
                        ${t}
                    </button>
                `).join('');

                let containerWidthClass = 'w-max pr-4';

                if (uniqueTags.length > 3) {
                    containerWidthClass = 'w-[260px] sm:w-[320px]';
                    for(let i=0; i<6; i++) {
                        tagsHtml += `<div class="grow-[10] h-0"></div>`;
                    }
                }
                
                tagsBtnHtml = `
                    <div class="absolute bottom-4 left-4 z-[60] flex items-end gap-3 pointer-events-none max-w-[calc(100%-2rem)]">
                        <button onclick="toggleModalTags(event)" class="pointer-events-auto relative flex items-center justify-center h-11 w-11 bg-white/60 dark:bg-dark-900/60 backdrop-blur-xl border border-gray-200 dark:border-dark-600 rounded-2xl hover:bg-white dark:hover:bg-dark-800 transition-all shrink-0 shadow-lg">
                            <i class="fa-solid fa-tags text-blue-500 text-lg"></i>
                            <span class="absolute -top-1.5 -right-1.5 bg-blue-600 text-white text-[9px] font-black w-5 h-5 flex items-center justify-center rounded-lg shadow-xl border-2 border-white dark:border-dark-900">${uniqueTags.length}</span>
                        </button>
                        <div id="iconTagsList" class="pointer-events-auto opacity-0 translate-y-2 hidden flex-wrap content-start gap-2 max-h-40 overflow-y-auto no-scrollbar p-3 transition-all duration-300 bg-white/90 dark:bg-dark-900/90 backdrop-blur-xl border border-gray-200/50 dark:border-dark-700/50 rounded-2xl shadow-2xl ${containerWidthClass}">
                            ${tagsHtml}
                        </div>
                    </div>
                `;
            } else {
                tagsBtnHtml = `
                    <div class="absolute bottom-4 left-4 z-[60]">
                        <div class="flex items-center justify-center h-11 w-11 border-2 border-dashed border-gray-300 dark:border-white/10 rounded-2xl opacity-20">
                            <i class="fa-solid fa-tags text-gray-400 text-lg"></i>
                        </div>
                    </div>
                `;
            }

            modalContent.innerHTML = `
                <div class="bg-gray-50 dark:bg-dark-900 w-full max-w-4xl rounded-[2rem] shadow-2xl flex flex-col md:flex-row overflow-hidden border border-gray-200 dark:border-dark-700 transform scale-95 transition-transform duration-300" id="modalBox" onclick="event.stopPropagation(); closeModalTags();">
                    <div class="w-full md:w-1/2 bg-checker border-b md:border-b-0 md:border-r border-gray-200 dark:border-dark-700 flex flex-col min-h-[450px] md:min-h-[550px] relative">
                        <div class="absolute top-0 left-0 right-0 p-6 pt-5 z-10 bg-gradient-to-b from-white/95 via-white/80 to-transparent dark:from-dark-900/95 dark:via-dark-900/80 dark:to-transparent pointer-events-none">
                            <h3 class="text-xl font-bold text-gray-900 dark:text-white capitalize truncate drop-shadow-sm">${baseName}</h3>
                            <p class="text-[11px] text-gray-700 dark:text-gray-300 mt-1 uppercase font-bold tracking-wider truncate drop-shadow-sm pointer-events-auto">
                                <span onclick="closeModal(); navigate('packs', '${previewIcon.artist}')" class="cursor-pointer hover:underline" title="View all packs by this Designer">${previewIcon.artist.replace(/-/g, ' ')}</span> 
                                <span class="mx-1 pointer-events-none">•</span> 
                                <span onclick="closeModal(); navigate('icons', '${previewIcon.artist}', '${previewIcon.set}')" class="cursor-pointer hover:underline" title="View all icons in this Pack">${previewIcon.set.replace(/-/g, ' ')}</span>
                            </p>
                        </div>
                        <div class="flex-1 flex items-center justify-center p-6 mt-12" onclick="closeModalTags()">
                            <!-- Added Overflow Hidden, Group, Crosshair, and Mouse Events here -->
                            <div class="w-64 h-64 sm:w-[22rem] sm:h-[22rem] flex items-center justify-center relative overflow-hidden group cursor-crosshair rounded-2xl" onmousemove="handleModalZoom(event, this)" onmouseleave="resetModalZoom(this)">
                                ${preview}
                            </div>
                        </div>
                        ${tagsBtnHtml}
                    </div>
                    <div class="w-full md:w-1/2 flex flex-col max-h-[70vh] md:max-h-[85vh]" onclick="closeModalTags()">
                        <div class="p-3 px-5 border-b border-gray-200 dark:border-dark-700 flex justify-between items-center bg-white dark:bg-dark-800 shrink-0">
                            <span class="text-[11px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">Available Formats</span>
                            <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 dark:bg-dark-700 border border-gray-200 dark:border-dark-600 text-gray-600 dark:text-gray-300 hover:bg-red-50 hover:text-red-600 dark:hover:bg-red-900/30 transition-colors shrink-0 shadow-sm">
                                <i class="fa-solid fa-xmark text-base"></i>
                            </button>
                        </div>
                        <div class="p-4 px-5 flex-1 overflow-y-auto space-y-2">${formatsHtml}</div>
                    </div>
                </div>
            `;

            viewModal.classList.remove('hidden'); viewModal.classList.add('flex'); 
            setTimeout(() => { 
                viewModal.classList.remove('opacity-0'); 
                document.getElementById('modalBox').classList.remove('scale-95');
                document.getElementById('modalBox').classList.add('scale-100');
            }, 10);
        }
        function closeModal() {
            viewModal.classList.add('opacity-0');
            const box = document.getElementById('modalBox');
            if(box) { box.classList.remove('scale-100'); box.classList.add('scale-95'); }
            setTimeout(() => { viewModal.classList.add('hidden'); viewModal.classList.remove('flex'); modalContent.innerHTML = ''; }, 300);
        }

        init();
    </script>
</body>
</html>

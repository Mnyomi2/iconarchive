<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern IconArchive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .icon-card:hover .overlay { opacity: 1; }
        .toast { transition: opacity 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col font-sans">

    <!-- Navbar -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-layer-group text-blue-600 text-2xl"></i>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Icon<span class="text-blue-600">Archive</span></h1>
            </div>
            
            <!-- Live Search Bar -->
            <div class="relative w-full sm:w-[500px]">
                <i class="fa-solid fa-search absolute left-4 top-3 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Search icons, sets, or artists (e.g. papirus, folder)..." 
                    class="w-full pl-11 pr-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition bg-gray-50">
            </div>
        </div>

        <!-- Format Filters -->
        <div class="bg-gray-100 border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 py-3 flex gap-2 overflow-x-auto no-scrollbar" id="categoryFilters">
                <button data-filter="all" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-blue-600 text-white shadow transition">All</button>
                <button data-filter="Vector" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-200 border border-gray-300 transition">Vector (SVG)</button>
                <button data-filter="PNG" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-200 border border-gray-300 transition">PNG</button>
                <button data-filter="Favicon" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-200 border border-gray-300 transition">Favicon</button>
                <button data-filter="Mac" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-200 border border-gray-300 transition">Mac (ICNS)</button>
                <button data-filter="Windows" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white text-gray-600 hover:bg-gray-200 border border-gray-300 transition">Windows (ICO)</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <div class="mb-4 flex justify-between items-center text-sm text-gray-500">
            <span id="resultCount">Loading icons...</span>
        </div>

        <div id="loading" class="text-center py-20">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-blue-600"></i>
            <p class="mt-4 text-gray-500 font-medium">Loading massive icon library...</p>
        </div>

        <!-- Icon Grid -->
        <div id="iconGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 hidden">
            <!-- Icons injected here by JS -->
        </div>

        <div id="noResults" class="text-center py-20 hidden">
            <i class="fa-regular fa-folder-open text-5xl text-gray-300"></i>
            <p class="mt-4 text-gray-500 text-lg">No icons found matching your search.</p>
        </div>
        
        <div class="text-center mt-8 hidden" id="loadMoreBtnContainer">
            <button id="loadMoreBtn" class="bg-white border border-gray-300 text-gray-700 px-6 py-2 rounded-full hover:bg-gray-100 transition shadow-sm font-medium">
                Load More
            </button>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-xl opacity-0 pointer-events-none toast z-50 flex items-center">
        <i class="fa-solid fa-check-circle text-green-400 mr-2 text-lg"></i> 
        <span id="toastMsg" class="font-medium">Copied!</span>
    </div>

    <script>
        // --- CONFIGURATION ---
        const GITHUB_USERNAME = "Mnyomi2";
        const REPO_NAME = "iconarchive";
        const BRANCH = "main";
        // ---------------------

        const CDN_BASE = `https://cdn.jsdelivr.net/gh/${GITHUB_USERNAME}/${REPO_NAME}@${BRANCH}/`;
        // We load the JSON we built locally!
        const JSON_URL = CDN_BASE + "master_index.json";

        let allIcons = [];
        let displayedIcons = [];
        let currentLimit = 100; // Lazy loading chunk size

        // DOM Elements
        const grid = document.getElementById('iconGrid');
        const loading = document.getElementById('loading');
        const noResults = document.getElementById('noResults');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const resultCount = document.getElementById('resultCount');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const loadMoreBtnContainer = document.getElementById('loadMoreBtnContainer');

        // 1. Fetch JSON Database
        async function fetchIcons() {
            try {
                // Add a cache-busting parameter to prevent loading old JSON during dev
                const response = await fetch(JSON_URL + "?t=" + new Date().getTime());
                if(!response.ok) throw new Error("JSON not found");
                
                allIcons = await response.json();
                
                loading.classList.add('hidden');
                grid.classList.remove('hidden');
                
                displayedIcons = allIcons;
                renderIcons(true);
            } catch (error) {
                loading.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-500 text-4xl"></i>
                                     <p class="mt-4 text-red-500">Could not load master_index.json. Did you push it to GitHub?</p>`;
            }
        }

        // 2. Render Grid
        function renderIcons(reset = false) {
            if (reset) {
                grid.innerHTML = '';
                currentLimit = 100;
            }
            
            resultCount.innerText = `Showing ${displayedIcons.length} icons`;

            if (displayedIcons.length === 0) {
                noResults.classList.remove('hidden');
                loadMoreBtnContainer.classList.add('hidden');
                return;
            }
            
            noResults.classList.add('hidden');

            const iconsToRender = displayedIcons.slice(grid.children.length, currentLimit);

            iconsToRender.forEach(icon => {
                const fullUrl = CDN_BASE + icon.path;
                const isImage = icon.format === 'Vector' || icon.format === 'PNG';
                
                const previewContent = isImage 
                    ? `<img src="${fullUrl}" alt="${icon.name}" class="w-16 h-16 object-contain" loading="lazy">`
                    : `<div class="w-16 h-16 flex items-center justify-center bg-gray-100 rounded-lg"><span class="text-xs font-bold text-gray-500">${icon.format}</span></div>`;

                const card = document.createElement('div');
                card.className = "icon-card bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center relative overflow-hidden transition hover:shadow-lg group cursor-pointer";
                
                card.innerHTML = `
                    <div class="mb-3">${previewContent}</div>
                    
                    <p class="text-[11px] text-gray-400 font-semibold uppercase tracking-wider mb-1 truncate w-full text-center" title="${icon.artist}">${icon.artist}</p>
                    <p class="text-xs text-gray-700 font-medium truncate w-full text-center mb-1" title="${icon.name}">${icon.name}</p>
                    <span class="text-[10px] bg-blue-50 text-blue-600 border border-blue-100 px-2 py-0.5 rounded-md font-bold">${icon.format}</span>
                    
                    <!-- Hover Actions -->
                    <div class="overlay absolute inset-0 bg-white/95 backdrop-blur-sm opacity-0 flex flex-col items-center justify-center gap-2 transition-opacity duration-200">
                        <button onclick="copyUrl('${fullUrl}')" class="w-10/12 py-1.5 bg-gray-800 text-white text-xs rounded-md shadow hover:bg-gray-700 transition flex items-center justify-center gap-2">
                            <i class="fa-solid fa-link"></i> CDN Link
                        </button>
                        <button onclick="downloadIcon('${fullUrl}', '${icon.name}')" class="w-10/12 py-1.5 bg-blue-600 text-white text-xs rounded-md shadow hover:bg-blue-700 transition flex items-center justify-center gap-2">
                            <i class="fa-solid fa-download"></i> Download
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });

            // Show or hide "Load More" button
            if (currentLimit < displayedIcons.length) {
                loadMoreBtnContainer.classList.remove('hidden');
            } else {
                loadMoreBtnContainer.classList.add('hidden');
            }
        }

        // Load More Logic
        loadMoreBtn.addEventListener('click', () => {
            currentLimit += 100;
            renderIcons(false);
        });

        // 3. Search & Filter Logic
        let currentFilter = 'all';

        function filterData() {
            const query = searchInput.value.toLowerCase();
            displayedIcons = allIcons.filter(icon => {
                const searchString = `${icon.name} ${icon.set} ${icon.artist}`.toLowerCase();
                const matchesSearch = searchString.includes(query);
                const matchesFilter = currentFilter === 'all' || icon.format === currentFilter;
                return matchesSearch && matchesFilter;
            });
            renderIcons(true);
        }

        searchInput.addEventListener('input', filterData);

        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => {
                    b.classList.remove('bg-blue-600', 'text-white');
                    b.classList.add('bg-white', 'text-gray-600');
                });
                e.target.classList.remove('bg-white', 'text-gray-600');
                e.target.classList.add('bg-blue-600', 'text-white');

                currentFilter = e.target.getAttribute('data-filter');
                filterData();
            });
        });

        // 4. Interaction Functions
        function copyUrl(url) {
            navigator.clipboard.writeText(url).then(() => {
                showToast("CDN URL Copied to clipboard!");
            });
        }

        async function downloadIcon(url, filename) {
            try {
                showToast("Downloading...");
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (err) {
                window.open(url, '_blank');
            }
        }

        // Toast
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        let toastTimeout;
        
        function showToast(message) {
            toastMsg.innerText = message;
            toast.classList.remove('opacity-0');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 2000);
        }

        // Boot up
        fetchIcons();
    </script>
</body>
</html>

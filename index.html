<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Icon Gallery</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#121212', 800: '#1e1e1e', 700: '#2d2d2d' }
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <style>
        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Transparent Checkered Background (For Icons) */
        .bg-checker {
            background-color: #ffffff;
            background-image: 
                linear-gradient(45deg, #f8fafc 25%, transparent 25%, transparent 75%, #f8fafc 75%, #f8fafc),
                linear-gradient(45deg, #f8fafc 25%, transparent 25%, transparent 75%, #f8fafc 75%, #f8fafc);
            background-size: 16px 16px;
            background-position: 0 0, 8px 8px;
        }
        .dark .bg-checker {
            background-color: #1e1e1e;
            background-image: 
                linear-gradient(45deg, #252525 25%, transparent 25%, transparent 75%, #252525 75%, #252525),
                linear-gradient(45deg, #252525 25%, transparent 25%, transparent 75%, #252525 75%, #252525);
        }

        /* Sidebar Dock Behavior */
        #sidebar { width: 5rem; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #sidebar:hover { width: 16rem; }
        #sidebar .nav-text { opacity: 0; width: 0; overflow: hidden; transition: opacity 0.3s, width 0.3s; white-space: nowrap; }
        #sidebar:hover .nav-text { opacity: 1; width: auto; margin-left: 1rem; }

        /* Icon Hover Animations (Matching Screenshot 1) */
        .icon-card .overlay { opacity: 0; transition: opacity 0.2s ease-in-out; }
        .icon-card:hover .overlay { opacity: 1; }
        .action-btn { transition: transform 0.1s, background-color 0.2s; }
        .action-btn:hover { transform: scale(1.1); background-color: rgba(0,0,0,0.8); text-color: white;}
        
        .toast { transition: opacity 0.3s, transform 0.3s; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-dark-900 text-gray-900 dark:text-gray-100 h-screen flex overflow-hidden font-sans">

    <!-- UBUNTU DOCK SIDEBAR -->
    <aside id="sidebar" class="bg-white dark:bg-dark-800 border-r border-gray-200 dark:border-dark-700 flex flex-col z-50 h-full shadow-lg shrink-0 group">
        
        <!-- Logo -->
        <div class="h-20 flex items-center px-5 border-b border-gray-200 dark:border-dark-700 w-full overflow-hidden shrink-0">
            <div class="bg-blue-600 p-2.5 rounded-xl text-white shrink-0 shadow-md">
                <i class="fa-solid fa-shapes text-xl"></i>
            </div>
            <h1 class="nav-text text-xl font-bold tracking-tight">Icon<span class="text-blue-500 font-light">Gallery</span></h1>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 py-6 flex flex-col gap-2 px-3 overflow-x-hidden">
            <button onclick="navigate('all')" class="nav-btn flex items-center p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-dark-700 transition group/btn w-full text-left" id="nav-all">
                <i class="fa-solid fa-border-all text-xl w-6 text-center text-gray-500 group-hover/btn:text-blue-600 shrink-0"></i>
                <span class="nav-text font-medium text-gray-700 dark:text-gray-300">All Icons</span>
            </button>
            
            <button onclick="navigate('designers')" class="nav-btn flex items-center p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-dark-700 transition group/btn w-full text-left" id="nav-designers">
                <i class="fa-solid fa-user-pen text-xl w-6 text-center text-gray-500 group-hover/btn:text-blue-600 shrink-0"></i>
                <span class="nav-text font-medium text-gray-700 dark:text-gray-300">Designers & Artists</span>
            </button>
        </nav>

        <!-- Bottom Controls -->
        <div class="p-3 border-t border-gray-200 dark:border-dark-700 flex flex-col gap-2">
            <button id="themeToggle" class="flex items-center p-3 rounded-xl hover:bg-gray-100 dark:hover:bg-dark-700 transition w-full text-left group/btn">
                <i class="fa-solid fa-moon text-xl w-6 text-center text-gray-500 dark:text-yellow-400 shrink-0 block dark:hidden"></i>
                <i class="fa-solid fa-sun text-xl w-6 text-center text-gray-500 dark:text-yellow-400 shrink-0 hidden dark:block"></i>
                <span class="nav-text font-medium text-gray-700 dark:text-gray-300 dark:hidden">Dark Mode</span>
                <span class="nav-text font-medium text-gray-700 dark:text-gray-300 hidden dark:block">Light Mode</span>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0 bg-gray-50 dark:bg-dark-900 relative">
        
        <!-- Header Controls -->
        <header class="px-6 py-4 border-b border-gray-200 dark:border-dark-700 bg-white dark:bg-dark-800 shrink-0 flex flex-col gap-4">
            
            <div class="flex items-center justify-between gap-4">
                <!-- Dynamic Breadcrumbs -->
                <div id="breadcrumbs" class="text-sm font-semibold flex items-center gap-2 text-gray-500 dark:text-gray-400 overflow-x-auto no-scrollbar whitespace-nowrap">
                    <!-- Injected by JS -->
                </div>

                <!-- Global Search & Details Toggle -->
                <div class="flex items-center gap-4 ml-auto">
                    <!-- Details Toggle -->
                    <label class="flex items-center gap-2 cursor-pointer bg-gray-100 dark:bg-dark-700 px-4 py-2 rounded-full border border-gray-200 dark:border-dark-600">
                        <input type="checkbox" id="detailsToggle" class="sr-only peer">
                        <div class="w-9 h-5 bg-gray-300 dark:bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600 relative"></div>
                        <span class="text-sm font-medium text-gray-700 dark:text-gray-300 whitespace-nowrap">Show Details</span>
                    </label>

                    <!-- Search -->
                    <div class="relative w-64 hidden sm:block">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Search..." 
                            class="w-full bg-gray-100 dark:bg-dark-700 border-none rounded-full pl-10 pr-4 py-2 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                </div>
            </div>

            <!-- Format & Size Filters (Only shows when viewing Icons) -->
            <div id="advancedFilters" class="hidden flex flex-wrap gap-2 items-center bg-gray-50 dark:bg-dark-900 p-2 rounded-lg border border-gray-200 dark:border-dark-700">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider mr-2">Formats:</span>
                <div id="formatButtonsContainer" class="flex flex-wrap gap-2"></div>
            </div>
            
        </header>

        <!-- Scrollable Grid Area -->
        <div id="scrollContainer" class="flex-1 overflow-y-auto p-6 relative">
            
            <div id="loading" class="absolute inset-0 flex flex-col items-center justify-center z-20">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
            </div>

            <!-- Dynamic Grid (Changes based on View State) -->
            <div id="mainGrid" class="grid gap-6">
                <!-- Cards Injected Here -->
            </div>
            
            <div id="scrollLoading" class="hidden text-center py-8">
                <i class="fa-solid fa-ellipsis fa-bounce text-2xl text-gray-400"></i>
            </div>
        </div>
    </main>

    <!-- Copy Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-gray-900 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-4 pointer-events-none z-50 flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toastMsg">Copied!</span>
    </div>

    <script>
        // --- CONFIGURATION ---
        const GITHUB_USERNAME = "Mnyomi2";
        const REPO_NAME = "iconarchive";
        const BRANCH = "main";
        const CDN_BASE = `https://cdn.jsdelivr.net/gh/${GITHUB_USERNAME}/${REPO_NAME}@${BRANCH}/`;
        const JSON_URL = CDN_BASE + "master_index.json";

        // --- STATE MANAGEMENT ---
        let allIcons = [];
        let groupedData = {}; // Structured: { Artist: { Pack: [icons...] } }
        let currentView = 'all'; // 'all', 'designers', 'packs', 'icons'
        let navState = { artist: null, pack: null };
        let showDetails = false;
        let activeFormatFilter = 'All'; // Specific format like 'Vector', 'PNG-48px'
        
        let displayList = [];
        let renderLimit = 100;
        let isFetching = false;

        // DOM Elements
        const mainGrid = document.getElementById('mainGrid');
        const loading = document.getElementById('loading');
        const scrollContainer = document.getElementById('scrollContainer');
        const breadcrumbs = document.getElementById('breadcrumbs');
        const detailsToggle = document.getElementById('detailsToggle');
        const searchInput = document.getElementById('searchInput');
        const advancedFilters = document.getElementById('advancedFilters');
        const formatButtonsContainer = document.getElementById('formatButtonsContainer');

        // Theme Setup (Light by Default)
        const html = document.documentElement;
        if(localStorage.getItem('theme') === 'dark') html.classList.add('dark');
        document.getElementById('themeToggle').addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });

        // Toggle Details
        detailsToggle.addEventListener('change', (e) => {
            showDetails = e.target.checked;
            renderView(); // Re-render current view
        });

        // --- CORE INITIALIZATION ---
        async function init() {
            try {
                const res = await fetch(JSON_URL + "?t=" + Date.now());
                if (!res.ok) throw new Error("JSON Fetch Failed");
                const rawData = await res.json();
                
                // Process and enhance data with specific sizes
                allIcons = rawData.map(icon => {
                    // Extract size from filename if exists (e.g. name.48.png -> 48px)
                    const sizeMatch = icon.name.match(/\.((\d+x\d+)|\d+)\.(png|ico|icns)$/i);
                    const specificSize = sizeMatch ? sizeMatch[1] + 'px' : null;
                    
                    // e.g., 'PNG' -> 'PNG-48px' or just 'Vector'
                    const exactFormat = specificSize ? `${icon.format}-${specificSize}` : icon.format;

                    return { ...icon, specificSize, exactFormat };
                });

                buildGroupedData();
                loading.classList.add('hidden');
                
                // Default to all icons
                navigate('all');
            } catch (err) {
                loading.innerHTML = `<p class="text-red-500">Failed to load index.json. Ensure python script was run.</p>`;
            }
        }

        // Group flat data into Hierarchy
        function buildGroupedData() {
            groupedData = {};
            allIcons.forEach(icon => {
                if(!groupedData[icon.artist]) groupedData[icon.artist] = {};
                if(!groupedData[icon.artist][icon.set]) groupedData[icon.artist][icon.set] = [];
                groupedData[icon.artist][icon.set].push(icon);
            });
        }

        // --- NAVIGATION ENGINE ---
        function navigate(view, artist = null, pack = null) {
            currentView = view;
            navState = { artist, pack };
            searchInput.value = '';
            activeFormatFilter = 'All';
            
            updateBreadcrumbs();
            updateSidebarHighlight();
            
            if (view === 'icons' || view === 'all') {
                buildFormatFilters();
                advancedFilters.classList.remove('hidden');
                // Adjust grid cols for icons
                mainGrid.className = "grid gap-6 grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10";
            } else {
                advancedFilters.classList.add('hidden');
                // Adjust grid cols for larger cards
                mainGrid.className = "grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4";
            }

            filterAndRender();
        }

        function updateBreadcrumbs() {
            let html = `<button onclick="navigate('all')" class="hover:text-blue-500 transition"><i class="fa-solid fa-house"></i> Home</button>`;
            
            if (currentView === 'designers') {
                html += ` <i class="fa-solid fa-chevron-right text-[10px]"></i> <span class="text-gray-800 dark:text-gray-200">Designers</span>`;
            }
            if (navState.artist) {
                html += ` <i class="fa-solid fa-chevron-right text-[10px]"></i> <button onclick="navigate('packs', '${navState.artist}')" class="hover:text-blue-500 transition">${navState.artist}</button>`;
            }
            if (navState.pack) {
                html += ` <i class="fa-solid fa-chevron-right text-[10px]"></i> <span class="text-gray-800 dark:text-gray-200">${navState.pack}</span>`;
            }
            breadcrumbs.innerHTML = html;
        }

        function updateSidebarHighlight() {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-blue-50', 'dark:bg-dark-700', 'text-blue-600'));
            if(currentView === 'all') document.getElementById('nav-all').classList.add('bg-blue-50', 'dark:bg-dark-700', 'text-blue-600');
            if(['designers', 'packs'].includes(currentView)) document.getElementById('nav-designers').classList.add('bg-blue-50', 'dark:bg-dark-700', 'text-blue-600');
        }

        // --- FILTERING & DATA PREP ---
        function filterAndRender() {
            const query = searchInput.value.toLowerCase();
            renderLimit = 100;
            scrollContainer.scrollTop = 0;

            if (currentView === 'designers') {
                displayList = Object.keys(groupedData).filter(a => a.toLowerCase().includes(query)).sort();
            } 
            else if (currentView === 'packs') {
                displayList = Object.keys(groupedData[navState.artist]).filter(p => p.toLowerCase().includes(query)).sort();
            } 
            else {
                // View: 'icons' or 'all'
                let sourceList = currentView === 'icons' ? groupedData[navState.artist][navState.pack] : allIcons;
                
                displayList = sourceList.filter(i => {
                    const matchQ = `${i.name} ${i.artist} ${i.set}`.toLowerCase().includes(query);
                    const matchF = activeFormatFilter === 'All' || i.exactFormat === activeFormatFilter;
                    return matchQ && matchF;
                });
            }

            mainGrid.innerHTML = '';
            renderChunk();
        }

        searchInput.addEventListener('input', filterAndRender);

        // --- FORMAT FILTER BUILDER ---
        function buildFormatFilters() {
            let sourceList = currentView === 'icons' ? groupedData[navState.artist][navState.pack] : allIcons;
            // Get unique exact formats (e.g. Vector, PNG-48px)
            const formats = [...new Set(sourceList.map(i => i.exactFormat))].sort();
            
            let html = `<button onclick="setFormat('All')" class="px-3 py-1 rounded-full text-xs font-semibold border transition ${activeFormatFilter === 'All' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100'}">All</button>`;
            
            formats.forEach(f => {
                const isActive = activeFormatFilter === f;
                const css = isActive ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100';
                // Make name pretty (PNG-48px -> PNG (48px))
                const displayName = f.replace('-', ' (') + (f.includes('-') ? ')' : '');
                html += `<button onclick="setFormat('${f}')" class="px-3 py-1 rounded-full text-xs font-semibold border transition ${css}">${displayName}</button>`;
            });
            
            formatButtonsContainer.innerHTML = html;
        }

        function setFormat(f) {
            activeFormatFilter = f;
            buildFormatFilters();
            filterAndRender();
        }

        // --- RENDERING ENGINE ---
        function renderChunk() {
            const chunk = displayList.slice(mainGrid.children.length, renderLimit);
            
            if(chunk.length === 0 && mainGrid.children.length === 0) {
                mainGrid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400 font-bold text-xl"><i class="fa-regular fa-face-frown text-4xl block mb-4"></i> No items found.</div>`;
                return;
            }

            chunk.forEach(item => {
                if (currentView === 'designers') mainGrid.appendChild(createDesignerCard(item));
                else if (currentView === 'packs') mainGrid.appendChild(createPackCard(item));
                else mainGrid.appendChild(createIconCard(item));
            });

            isFetching = false;
        }

        // Card Renderers
        function createDesignerCard(artistName) {
            const packs = Object.keys(groupedData[artistName]);
            const totalIcons = packs.reduce((acc, p) => acc + groupedData[artistName][p].length, 0);
            
            const div = document.createElement('div');
            div.className = "bg-white dark:bg-dark-800 border border-gray-200 dark:border-dark-700 rounded-2xl p-6 hover:shadow-xl transition cursor-pointer group flex flex-col items-center text-center gap-3";
            div.onclick = () => navigate('packs', artistName);
            div.innerHTML = `
                <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 rounded-full flex items-center justify-center group-hover:scale-110 transition">
                    <i class="fa-solid fa-user-pen text-2xl text-blue-500"></i>
                </div>
                <div>
                    <h3 class="font-bold text-lg text-gray-900 dark:text-white truncate w-full">${artistName}</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">${packs.length} Packs • ${totalIcons} Icons</p>
                </div>
            `;
            return div;
        }

        function createPackCard(packName) {
            const icons = groupedData[navState.artist][packName];
            const previews = icons.filter(i => ['Vector','PNG'].includes(i.format)).slice(0, 4); // Get up to 4 images
            
            let previewHtml = '';
            previews.forEach(p => {
                previewHtml += `<img src="${CDN_BASE}${p.path}" class="w-12 h-12 object-contain drop-shadow-sm" loading="lazy">`;
            });
            if(previews.length === 0) previewHtml = `<i class="fa-solid fa-folder-open text-4xl text-gray-300"></i>`;

            const div = document.createElement('div');
            div.className = "bg-white dark:bg-dark-800 border border-gray-200 dark:border-dark-700 rounded-xl hover:shadow-xl transition cursor-pointer group overflow-hidden flex flex-col";
            div.onclick = () => navigate('icons', navState.artist, packName);
            
            // EXACTLY matches screenshot 3
            div.innerHTML = `
                <div class="h-32 bg-gray-50 dark:bg-dark-900 border-b border-gray-100 dark:border-dark-700 flex items-center justify-center gap-4 p-4">
                    ${previewHtml}
                </div>
                <div class="p-4 flex justify-between items-center bg-white dark:bg-dark-800">
                    <h3 class="font-semibold text-gray-800 dark:text-white truncate w-2/3">${packName}</h3>
                    <span class="text-[10px] font-bold uppercase text-gray-400 bg-gray-100 dark:bg-dark-700 px-2 py-1 rounded">${icons.length} ICONS</span>
                </div>
            `;
            return div;
        }

        function createIconCard(icon) {
            const fullUrl = CDN_BASE + icon.path;
            const isImg = ['Vector', 'PNG'].includes(icon.format);
            const preview = isImg ? `<img src="${fullUrl}" class="w-full h-full object-contain transition-transform duration-300 group-hover:scale-110" loading="lazy">` 
                                  : `<i class="fa-solid fa-file text-4xl text-gray-300"></i>`;

            const div = document.createElement('div');
            
            // EXACTLY matches Screenshot 1 & 2 logic
            if (!showDetails) {
                // Checkered BG, No text, Hover dark overlay with Action Buttons top centered
                div.className = "icon-card bg-checker border border-gray-200 dark:border-dark-700 rounded-2xl relative aspect-square group overflow-hidden shadow-sm";
                div.innerHTML = `
                    <div class="absolute inset-4 flex items-center justify-center">${preview}</div>
                    
                    <!-- Screenshot 1 Hover Overlay -->
                    <div class="overlay absolute inset-0 bg-black/40 backdrop-blur-[2px] flex flex-col justify-between p-3">
                        <div class="flex justify-center gap-2 mt-1">
                            <button onclick="window.open('${fullUrl}', '_blank')" class="action-btn w-9 h-9 rounded-full bg-gray-600 text-white flex items-center justify-center hover:bg-gray-900 shadow-md" title="View"><i class="fa-solid fa-magnifying-glass-plus text-sm"></i></button>
                            <button onclick="copyUrl('${fullUrl}')" class="action-btn w-9 h-9 rounded-full bg-gray-600 text-white flex items-center justify-center hover:bg-gray-900 shadow-md" title="Copy URL"><i class="fa-regular fa-copy text-sm"></i></button>
                            <button onclick="downloadIcon('${fullUrl}', '${icon.name}')" class="action-btn w-9 h-9 rounded-full bg-gray-600 text-white flex items-center justify-center hover:bg-gray-900 shadow-md" title="Download"><i class="fa-solid fa-download text-sm"></i></button>
                        </div>
                        <button class="w-full bg-white text-gray-900 font-bold text-xs py-2 rounded-xl shadow mt-auto hover:bg-gray-100 transition">Utiliser</button>
                    </div>
                `;
            } else {
                // Showing Details (Text under icon)
                div.className = "icon-card bg-white dark:bg-dark-800 border border-gray-200 dark:border-dark-700 rounded-xl p-4 relative flex flex-col items-center shadow-sm group overflow-hidden";
                div.innerHTML = `
                    <div class="w-16 h-16 mb-3 bg-checker rounded-lg flex items-center justify-center relative">
                        <div class="absolute inset-1 flex items-center justify-center">${preview}</div>
                    </div>
                    <p class="text-[11px] text-gray-800 dark:text-gray-200 font-medium truncate w-full text-center" title="${icon.name}">${icon.name}</p>
                    <span class="text-[9px] bg-gray-100 dark:bg-dark-700 text-gray-500 mt-1 px-2 py-0.5 rounded font-bold">${icon.exactFormat}</span>
                    
                    <div class="overlay absolute inset-0 bg-white/90 dark:bg-dark-900/90 backdrop-blur-sm flex flex-col items-center justify-center gap-2">
                        <button onclick="copyUrl('${fullUrl}')" class="w-10/12 py-1.5 bg-gray-800 text-white text-xs rounded-md shadow hover:scale-105 transition"><i class="fa-solid fa-link"></i> Copy URL</button>
                        <button onclick="downloadIcon('${fullUrl}', '${icon.name}')" class="w-10/12 py-1.5 bg-blue-600 text-white text-xs rounded-md shadow hover:scale-105 transition"><i class="fa-solid fa-download"></i> Download</button>
                    </div>
                `;
            }
            return div;
        }

        // Infinite Scroll
        scrollContainer.addEventListener('scroll', () => {
            if (isFetching || renderLimit >= displayList.length) return;
            if (scrollContainer.scrollTop + scrollContainer.clientHeight >= scrollContainer.scrollHeight - 100) {
                isFetching = true;
                renderLimit += 100;
                renderChunk();
            }
        });

        // --- UTILITIES ---
        function copyUrl(url) {
            navigator.clipboard.writeText(url).then(() => showToast("CDN URL Copied!"));
        }

        async function downloadIcon(url, filename) {
            try {
                showToast("Downloading...");
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl; a.download = filename;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (err) { window.open(url, '_blank'); }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => toast.classList.add('opacity-0', 'translate-y-4'), 2000);
        }

        init();
    </script>
</body>
</html>
